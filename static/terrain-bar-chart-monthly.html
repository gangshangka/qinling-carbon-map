    <!-- 备用CDN：如果主CDN加载失败，尝试从unpkg加载 -->
    <script>
        // 页面加载完成后检查ECharts是否成功加载，若失败则动态添加备用CDN脚本
        window.addEventListener('load', function() {
            if (typeof echarts === 'undefined') {
                console.warn('主ECharts CDN加载失败，尝试备用CDN...');
                var backupScript = document.createElement('script');
                backupScript.src = 'https://unpkg.com/echarts@5.4.3/dist/echarts.min.js';
                backupScript.onload = function() {
                    console.log('备用ECharts CDN加载成功');
                    if (window.mapInitializer) window.mapInitializer();
                };
                backupScript.onerror = function() {
                    console.error('所有ECharts CDN加载失败，地图无法显示');
                    if (window.mapInitializer) window.mapInitializer();
                };
                document.head.appendChild(backupScript);
            }
        });
    </script>

    <!-- ================= 核心JavaScript逻辑 ================= -->
    <script>
        // ------------------ 全局变量 ------------------
        let currentChart = null;          // 当前ECharts实例
        let is3DMode = false;             // 是否3D模式（预留，当前只实现2D）
        let currentViewAngle = 'top';     // 视角（预留）
        let countyCoordinates = {};       // 县区名称 -> [经度, 纬度] 映射
        let monthlyCarbonData = {};       // 数据结构：年份 -> 月份 -> 县区 -> 碳汇值
        let currentYear = '2022';         // 当前选择的年份
        let currentMonth = '1';           // 当前选择的月份
        
        // ------------------ 辅助函数 ------------------
        // 颜色亮度调整（用于柱状图渐变效果）
        function lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (
                0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        function darkenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) - amt;
            const G = (num >> 8 & 0x00FF) - amt;
            const B = (num & 0x0000FF) - amt;
            return '#' + (
                0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        // 显示加载状态
        function showLoading(message = '正在加载秦岭地形与碳汇数据...') {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const detailsEl = document.getElementById('loading-details');
            
            if (loadingEl) loadingEl.style.display = 'flex';
            if (errorEl) errorEl.style.display = 'none';
            if (detailsEl) detailsEl.textContent = message;
        }
        
        // 隐藏加载状态
        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.style.display = 'none';
        }
        
        // 显示错误信息
        function showError(message) {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const errorMsgEl = document.getElementById('error-message');
            
            if (loadingEl) loadingEl.style.display = 'none';
            if (errorEl) errorEl.style.display = 'block';
            
            // 特殊处理隐私跟踪错误提示
            let displayMessage = message;
            if (message.includes('Tracking Prevention') || message.includes('storage') || message.includes('access')) {
                displayMessage = message + '<br><br><strong>解决方案:</strong><br>' +
                    '1. 请尝试使用其他浏览器（如Chrome、Firefox）<br>' +
                    '2. 或在当前浏览器的隐私设置中允许本网站<br>' +
                    '3. 或点击地址栏的"盾牌"图标，临时禁用跟踪保护';
            }
            
            if (errorMsgEl) errorMsgEl.innerHTML = displayMessage;
            console.error('地图加载错误:', message);
        }
        
        // 绑定重试按钮事件
        function setupRetryButton() {
            const retryBtn = document.getElementById('retry-btn');
            if (retryBtn) {
                retryBtn.onclick = function() {
                    console.log('用户点击重试按钮');
                    showLoading('正在重新加载数据...');
                    setTimeout(() => {

        }
        
        // 绑定年份/月份选择器和更新按钮
        function setupControls() {
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const updateBtn = document.getElementById('updateBtn');
            
            if (yearSelect) {
                yearSelect.addEventListener('change', function() {
                    currentYear = this.value;
                });
                yearSelect.value = currentYear;
            }
            
            if (monthSelect) {
                monthSelect.addEventListener('change', function() {
                    currentMonth = this.value;
                });
                monthSelect.value = currentMonth;
            }
            
            if (updateBtn) {
                updateBtn.addEventListener('click', function() {

                    if (currentChart) {
                        updateChartWithMonthlyData();
                    }
                });
            }
        }
        
        // ------------------ 地图初始化 ------------------
        function initMap() {
            console.log('initMap函数开始执行');
            console.log('当前模式: 2D地图');
            showLoading('正在初始化2D地图...');
            
            // 销毁旧实例
            if (currentChart) {
                currentChart.dispose();
                currentChart = null;
            }
            
            // 检查ECharts库是否可用
            if (typeof echarts === 'undefined') {
                const errorMsg = 'ECharts库未加载！请检查网络连接或CDN链接';
                console.error(errorMsg);
                showError(errorMsg);
                return;
            }
            
            const chartDom = document.getElementById('map');
            if (!chartDom) {
                const errorMsg = '找不到地图容器元素 #map';
                console.error(errorMsg);
                showError(errorMsg);
                return;
            }
            
            let myChart;
            try {
                myChart = echarts.init(chartDom);
                currentChart = myChart;
            } catch (error) {
                const errorMsg = `ECharts初始化失败: ${error.message}`;
                console.error(errorMsg);
                showError(errorMsg);
                return;
            }

            // 开始加载2D地图（地形底图 + 数据）
            init2DMap(myChart);
            
            // 窗口大小变化时重绘
            window.addEventListener('resize', function() {
                myChart.resize();
            });
        }
        
        // 配置2D地图基础选项
        function init2DMap(chart) {
            console.log('初始化2D地图...');
            const option = {
                backgroundColor: 'transparent',
                title: { show: false },
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.seriesType === 'scatter') {
                            return `<strong>${params.data.name}</strong><br/>
                                    碳汇值: <b>${params.data.value[2].toFixed(2)}</b> 单位<br/>
                                    坐标: ${params.data.value[0].toFixed(4)}°E, ${params.data.value[1].toFixed(4)}°N`;
                        } else {
                            return `<strong>${params.name}</strong><br/>县区边界`;
                        }
                    },
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    textStyle: { color: '#fff' }
                },
                visualMap: { show: false }  // 暂不启用visualMap，颜色由系列内部决定
            };
            try {
                chart.setOption(option);
                console.log('2D基础图表配置设置成功');
            } catch (setOptionError) {
                console.error('设置2D图表配置失败:', setOptionError);
                // 尝试简化配置
                try {
                    chart.setOption({ backgroundColor: 'transparent', title: { show: false } });
                } catch (simpleError) {
                    showError(`2D图表初始化失败: ${setOptionError.message}`);
                    return;
                }
            }
            // 加载地形边界数据
            loadGeoJSON(chart);
        }
        
        // 加载秦岭地理边界数据（GeoJSON）
        async function loadGeoJSON(chart) {
            console.log('开始加载GeoJSON数据...');
            showLoading('正在加载秦岭地形数据...');
            
            try {
                // 优先使用内嵌的全局变量 window.qinlingGeoJSON（由 qinling-geojson.js 提供）
                let geoJSON = window.qinlingGeoJSON;
                if (!geoJSON) {
                    console.warn('window.qinlingGeoJSON未找到，尝试从本地文件加载...');
                    // 通过XHR加载本地 qinling.geojson 文件，兼容 file:// 协议
                    const url = 'qinling.geojson';
                    geoJSON = await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('GET', url, true);
                        xhr.responseType = 'json';
                        xhr.onload = function() {
                            // file:// 协议下 status 可能为0，视为成功
                            if (xhr.status === 200 || xhr.status === 0) {
                                resolve(xhr.response);
                            } else {
                                reject(new Error(`HTTP error! status: ${xhr.status}`));
                            }
                        };
                        xhr.onerror = () => reject(new Error('网络错误，无法加载GeoJSON文件'));
                        xhr.send();
                    });
                }
                
                // 移除可能引起ECharts兼容问题的CRS属性
                if (geoJSON.crs) delete geoJSON.crs;
                if (!geoJSON.features || geoJSON.features.length === 0) {
                    throw new Error('GeoJSON数据中没有特征（features）');
                }
                
                // 注册地图
                echarts.registerMap('qinling', geoJSON);
                console.log('地图注册成功！');
                
                // 设置geo组件显示地形底图
                chart.setOption({
                    geo: {
                        map: 'qinling',
                        center: [108.5, 34.2],
                        zoom: 1.3,
                        top: '10%',
                        itemStyle: {
                            areaColor: '#e8f4ff',
                            borderColor: '#b3d9ff',
                            borderWidth: 0.5,
                            shadowColor: 'rgba(100, 150, 255, 0.3)',
                            shadowBlur: 5
                        },
                        emphasis: {
                            itemStyle: { areaColor: '#3a9ef9' }
                        },
                        roam: true,      // 允许缩放和平移
                        label: { show: false }
                    }
                });
                
                console.log('地形图加载成功，开始加载坐标和月度数据...');
                showLoading('地形图加载成功，正在加载坐标和月度数据...');
                
                // 并行加载坐标映射和月度数据
                await Promise.all([loadCountyCoordinates(), loadMonthlyCarbonData()]);
                // 加载当前月份数据并显示柱状图
                await loadCurrentMonthData(chart);
                
                hideLoading();
                console.log('所有数据加载完成！');
                
            } catch (error) {
                console.error('加载GeoJSON数据失败:', error);
                // 备用：绘制一个简单矩形作为地形
                createFallbackMap(chart);
            }
        }
        
        // 加载县区中心点坐标（用于定位柱状图）
        async function loadCountyCoordinates() {
            try {
                // 优先从内嵌的 <script id="map3dSampledData"> 解析
                const jsonScript = document.getElementById('map3dSampledData');
                if (jsonScript && jsonScript.textContent) {
                    const data = JSON.parse(jsonScript.textContent);
                    countyCoordinates = {};
                    if (data.features && Array.isArray(data.features)) {
                        data.features.forEach(feature => {
                            if (feature.name && feature.center && feature.center.length >= 2) {
                                countyCoordinates[feature.name] = [feature.center[0], feature.center[1]];
                            }
                        });
                    }
                    console.log(`从嵌入数据加载县区坐标成功，共 ${Object.keys(countyCoordinates).length} 个县区`);
                    return;
                }
                // 否则尝试 fetch map3d_sampled.json
                const url = 'map3d_sampled.json';
                const response = await fetch(url);
                if (!response.ok) throw new Error(`坐标数据加载失败: ${response.status}`);
                const data = await response.json();
                countyCoordinates = {};
                data.features.forEach(feature => {
                    if (feature.name && feature.center) {
                        countyCoordinates[feature.name] = [feature.center[0], feature.center[1]];
                    }
                });
                console.log(`县区坐标数据加载成功，共 ${Object.keys(countyCoordinates).length} 个县区`);
            } catch (error) {
                console.error('加载县区坐标数据失败:', error);
                // 内置几个常见县区的备用坐标，防止完全无数据
                countyCoordinates = {
                    "宁陕县": [108.4401, 33.5315],
                    "丹凤县": [110.4313, 33.6797],
                    "柞水县": [109.2734, 33.6823],
                    "长安区": [108.9475, 34.1642],
                    "鄠邑区": [108.6056, 34.1116],
                    "蓝田县": [109.3175, 34.1562],
                    "周至县": [108.2225, 34.1642],
                    "太白县": [107.3195, 34.0592],
                    "商州区": [109.9377, 33.8706],
                    "洛南县": [110.1457, 34.0918]
                };
                console.log('使用备用县区坐标数据');
            }
        }
        
        // 加载月度碳汇数据（支持全局变量或json文件）
        async function loadMonthlyCarbonData() {
            try {
                // 优先使用全局变量 monthlyCarbonData（由 monthlyCarbonData.js 提供）
                if (window.monthlyCarbonData && typeof window.monthlyCarbonData === 'object') {
                    monthlyCarbonData = window.monthlyCarbonData;
                    console.log(`从全局变量加载月度碳汇数据，年份: ${Object.keys(monthlyCarbonData).length}`);
                    return;
                }
                // 否则 fetch carbonData2.json
                const url = 'carbonData2.json';
                const response = await fetch(url);
                if (!response.ok) throw new Error(`月度数据加载失败: ${response.status}`);
                monthlyCarbonData = await response.json();
                console.log(`月度碳汇数据加载成功，年份: ${Object.keys(monthlyCarbonData).length}`);
            } catch (error) {
                console.error('加载月度碳汇数据失败:', error);
                createFallbackMonthlyData(); // 生成模拟数据
            }
        }
        
        // 生成模拟月度数据（确保页面有数据显示）
        function createFallbackMonthlyData() {
            console.log('创建备用月度数据');
            monthlyCarbonData = {
                "2022": {
                    "1": {
                        "宁陕县": 150.0,
                        "丹凤县": 200.0,
                        "柞水县": 180.0,
                        "长安区": 120.0,
                        "鄠邑区": 110.0,
                        "蓝田县": 130.0,
                        "周至县": 140.0,
                        "太白县": 90.0,
                        "商州区": 160.0,
                        "洛南县": 170.0
                    },
                    "2": {
                        "宁陕县": 160.0,
                        "丹凤县": 210.0,
                        "柞水县": 190.0,
                        "长安区": 130.0,
                        "鄠邑区": 120.0,
                        "蓝田县": 140.0,
                        "周至县": 150.0,
                        "太白县": 100.0,
                        "商州区": 170.0,
                        "洛南县": 180.0
                    }
                }
            };
        }
        
        // 根据当前选中的年月加载数据并更新图表
        async function loadCurrentMonthData(chart) {
            try {
                console.log(`加载当前月份数据: ${currentYear}-${currentMonth}`);
                
                // 检查数据是否存在，若不存在则自动切换到第一个可用年月
                if (!monthlyCarbonData[currentYear] || !monthlyCarbonData[currentYear][currentMonth]) {
                    console.warn(`没有找到 ${currentYear}年${currentMonth}月的数据，使用默认数据`);
                    const years = Object.keys(monthlyCarbonData);
                    if (years.length > 0) {
                        const firstYear = years[0];
                        const months = Object.keys(monthlyCarbonData[firstYear]);
                        if (months.length > 0) {
                            currentYear = firstYear;
                            currentMonth = months[0];
                            document.getElementById('yearSelect').value = currentYear;
                            document.getElementById('monthSelect').value = currentMonth;
                        }
                    }
                }
                
                const monthData = monthlyCarbonData[currentYear][currentMonth];
                const chartData = [];
                let totalCarbon = 0, maxCarbon = -Infinity, minCarbon = Infinity;
                let countyCount = 0;
                
                // 遍历所有有坐标的县区，提取对应月份的碳汇值
                for (const countyName in countyCoordinates) {
                    if (monthData[countyName] !== undefined) {
                        const carbonValue = monthData[countyName];
                        const coords = countyCoordinates[countyName];
                        chartData.push({
                            name: countyName,
                            value: [coords[0], coords[1], carbonValue],
                            carbon: carbonValue
                        });
                        totalCarbon += carbonValue;
                        if (carbonValue > maxCarbon) maxCarbon = carbonValue;
                        if (carbonValue < minCarbon) minCarbon = carbonValue;
                        countyCount++;
                    }
                }
                
                const meanCarbon = countyCount > 0 ? totalCarbon / countyCount : 0;
                // 更新统计卡片
                document.getElementById('data-count').textContent = countyCount;
                document.getElementById('mean-value').textContent = meanCarbon.toFixed(2);
                document.getElementById('max-value').textContent = maxCarbon.toFixed(2);
                document.getElementById('min-value').textContent = minCarbon.toFixed(2);
                
                // 显示2D柱状图（叠加在地图上）
                display2DData(chart, chartData);
                console.log(`当前月份数据加载完成，共 ${countyCount} 个县区`);
                
            } catch (error) {
                console.error('加载当前月份数据失败:', error);
                showError(`加载月份数据失败: ${error.message}`);
            }
        }
        
        // 更新图表（由按钮触发）
        function updateChartWithMonthlyData() {
            if (!currentChart) {
                console.log('图表未初始化，无法更新');
                return;
            }
            showLoading(`正在加载 ${currentYear}年${currentMonth}月数据...`);
            loadCurrentMonthData(currentChart).then(() => hideLoading()).catch(error => {
                console.error('更新图表失败:', error);
                hideLoading();
            });
        }
        
        // 在2D地图上显示柱状图（使用scatter系列，自定义矩形符号）
        function display2DData(chart, data) {
            console.log(`显示2D数据，共 ${data.length} 个点`);
            const barData = data.map(item => ({ name: item.name, value: item.value }));
            
            chart.setOption({
                series: [{
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: barData,
                    // 符号为矩形，宽度固定8，高度根据碳汇值缩放（范围5-40）
                    symbol: 'path://M0,0 L1,0 L1,1 L0,1 Z',
                    symbolSize: function(val) {
                        const carbonValue = Math.abs(val[2]);
                        const height = Math.max(5, Math.min(40, carbonValue / 10));
                        return [8, height];
                    },
                    symbolOffset: function(val) {
                        const carbonValue = Math.abs(val[2]);
                        const height = Math.max(5, Math.min(40, carbonValue / 10));
                        return [0, -height / 2]; // 偏移使矩形底部对齐坐标点
                    },
                    itemStyle: {
                        color: function(params) {
                            const val = params.data.value[2];
                            let baseColor;
                            if (val <= 0) baseColor = '#ff6666';      // 负值红色
                            else if (val < 100) baseColor = '#ffcc00'; // 低碳汇黄色
                            else if (val < 250) baseColor = '#66ff66'; // 中碳汇绿色
                            else baseColor = '#00cc66';                // 高碳汇深绿色
                            // 返回渐变对象，实现柱体立体感
                            return {
                                type: 'linear',
                                x: 0, y: 0, x2: 0, y2: 1,
                                colorStops: [
                                    { offset: 0, color: lightenColor(baseColor, 30) },
                                    { offset: 0.7, color: baseColor },
                                    { offset: 1, color: darkenColor(baseColor, 30) }
                                ]
                            };
                        },
                        opacity: 0.95,
                        borderColor: '#ffffff',
                        borderWidth: 0.5,
                        shadowBlur: 6,
                        shadowColor: 'rgba(0, 0, 0, 0.4)',
                        shadowOffsetX: 1,
                        shadowOffsetY: 2
                    },
                    emphasis: {
                        itemStyle: {
                            borderColor: '#fff',
                            borderWidth: 2,
                            shadowBlur: 10,
                            shadowColor: 'rgba(0, 255, 255, 0.8)'
                        }
                    },
                    zlevel: 2,
                    label: { show: false }
                }]
            });
        }
        
        // 备用地图：当GeoJSON加载失败时，绘制一个简单的矩形区域作为底图
        function createFallbackMap(chart) {
            console.log('创建备用地图...');
            const fallbackGeoJSON = {
                type: "FeatureCollection",
                features: [{
                    type: "Feature",
                    properties: { name: "秦岭区域" },
                    geometry: {
                        type: "Polygon",
                        coordinates: [[[105, 32], [111, 32], [111, 35], [105, 35], [105, 32]]]
                    }
                }]
            };
            try {
                echarts.registerMap('qinling', fallbackGeoJSON);
                chart.setOption({
                    geo: {
                        map: 'qinling',
                        center: [108.5, 34.2],
                        zoom: 1.3,
                        itemStyle: { areaColor: '#e8f4ff', borderColor: '#b3d9ff', borderWidth: 0.5 },
                        roam: true,
                        label: { show: false }
                    }
                });
                console.log('备用地图创建成功');
                // 继续加载坐标和月度数据，保证柱状图显示
                Promise.all([loadCountyCoordinates(), loadMonthlyCarbonData()])
                    .then(() => loadCurrentMonthData(chart))
                    .catch(() => {})
                    .finally(() => hideLoading());
            } catch (error) {
                console.error('创建备用地图失败:', error);
                showError('地图加载失败，无法显示地形图。');
                hideLoading();
            }
        }
        
        // 页面加载后启动
        window.addEventListener('load', function() {
            setupRetryButton();
            setupControls();
            initMap();
        });
    </script>
</body>
