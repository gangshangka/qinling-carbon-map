<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView 测试</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>WebView 测试页面</h1>
    <p>如果看到这个页面，说明web-view加载正常。</p>
    <div class="status">
        <p>加载时间: <span id="time"></span></p>
        <p>页面状态: <span id="status">已加载</span></p>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleTimeString();
        console.log('测试页面加载成功');
    </script>
</body>
</html>
