        // 颜色辅助函数
        function lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (
                0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        function darkenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) - amt;
            const G = (num >> 8 & 0x00FF) - amt;
            const B = (num & 0x0000FF) - amt;
            return '#' + (
                0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }

        // 加载秦岭地理边界数据
        async function loadGeoJSON(chart) {
            console.log('开始加载GeoJSON数据...');
            showLoading('正在加载秦岭地形数据...');
            
            try {
                // 直接使用嵌入的GeoJSON数据，避免CORS限制
                console.log('检查window.qinlingGeoJSON:', typeof window.qinlingGeoJSON, window.qinlingGeoJSON ? '存在' : '未定义或为空');
                let geoJSON = window.qinlingGeoJSON;
                
                if (!geoJSON) {
                    console.warn('window.qinlingGeoJSON未找到，尝试从本地文件加载...');
                    // 使用XMLHttpRequest加载本地GeoJSON文件，兼容file://协议
                    const url = 'qinling.geojson';
                    console.log('请求URL:', url);
                    
                    geoJSON = await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('GET', url, true);
                        xhr.responseType = 'json';
                        xhr.onload = function() {
                            if (xhr.status === 200 || xhr.status === 0) { // 0表示file://协议成功
                                console.log('GeoJSON数据加载成功，特征数量:', xhr.response.features ? xhr.response.features.length : 0);
                                resolve(xhr.response);
                            } else {
                                reject(new Error(`HTTP error! status: ${xhr.status}`));
                            }
                        };
                        xhr.onerror = function() {
                            reject(new Error('网络错误，无法加载GeoJSON文件'));
                        };
                        xhr.send();
                    });
                } else {
                    console.log('使用嵌入的GeoJSON数据，特征数量:', geoJSON.features ? geoJSON.features.length : 0);
                }
                
                // 删除CRS属性（ECharts可能不支持）
                if (geoJSON.crs) {
                    delete geoJSON.crs;
                    console.log('已删除CRS属性');
                }
                
                // 确保有features
                if (!geoJSON.features || geoJSON.features.length === 0) {
                    throw new Error('GeoJSON数据中没有特征（features）');
                }
                
                // 注册地图（添加详细错误捕获）
                console.log('开始注册地图到ECharts...');
                try {
                    echarts.registerMap('qinling', geoJSON);
                    console.log('地图注册成功！');
                    
                    // 检查地图是否成功注册
                    try {
                        const registeredMaps = echarts.getMap('qinling');
                        console.log('地图注册验证成功:', registeredMaps ? '地图数据已注册' : '地图数据为空');
                    } catch (checkError) {
                        console.warn('地图注册验证失败，但继续:', checkError.message);
                    }
                    
                } catch (registerError) {
                    console.error('ECharts地图注册失败:', registerError);
                    console.error('错误详情:', registerError.message, registerError.stack);
                    
                    // 尝试简化GeoJSON数据
                    console.log('尝试简化GeoJSON数据...');
                    try {
                        // 创建一个简化版本的GeoJSON
                        const simplifiedGeoJSON = {
                            type: "FeatureCollection",
                            features: geoJSON.features.map(feature => {
                                // 只保留必要的属性
                                return {
                                    type: "Feature",
                                    geometry: feature.geometry,
                                    properties: { name: feature.properties ? feature.properties.name || feature.properties.NAME || '未知区域' : '未知区域' }
                                };
                            })
                        };
                        
                        console.log('使用简化GeoJSON重新注册...');
                        echarts.registerMap('qinling', simplifiedGeoJSON);
                        console.log('简化地图注册成功！');
                    } catch (simplifyError) {
                        console.error('简化地图注册也失败:', simplifyError);
                        throw new Error(`地图注册失败: ${registerError.message}`);
                    }
                }
                
                // 更新图表显示地图
                console.log('更新图表显示地图...');
                try {
                    chart.setOption({
                        geo: {
                            map: 'qinling',
                            center: [108.5, 34.2], // 秦岭中心点，纬度调高使地图上移
                            zoom: 1.3, // 稍微放大
                            top: '10%', // 使地图在容器中更靠上
                            itemStyle: {
                                areaColor: '#e8f4ff', // 简约的浅蓝色背景
                                borderColor: '#b3d9ff',
                                borderWidth: 0.5,
                                shadowColor: 'rgba(100, 150, 255, 0.3)', // 柔和的蓝色阴影
                                shadowBlur: 5,
                                shadowOffsetX: 2,
                                shadowOffsetY: 2
                            },
                            emphasis: {
                                itemStyle: {
                                    areaColor: '#3a9ef9'
                                }
                            },
                            roam: true, // 允许缩放和平移
                            label: {
                                show: false // 简约设计，隐藏地图标签
                            }
                        }
                    });
                    console.log('地图更新成功！');
                } catch (mapUpdateError) {
                    console.error('更新地图显示失败:', mapUpdateError);
                    console.error('错误详情:', mapUpdateError.message);
                    
                    // 尝试更简单的更新，只设置地图名称

                        chart.setOption({
                            geo: { map: 'qinling' }

                        console.error('简化地图更新也失败:', simpleUpdateError);

                    }
                }
                
                console.log('地形图加载成功，开始加载坐标和月度数据...');
                showLoading('地形图加载成功，正在加载坐标和月度数据...');
                
                // 地形图加载成功后，再加载坐标数据和月度数据
                await Promise.all([loadCountyCoordinates(), loadMonthlyCarbonData()]);
                
                // 然后加载当前月份的碳汇数据
                await loadCurrentMonthData(chart);
                
                // 全部加载完成
                console.log('所有数据加载完成！');
                hideLoading();
                
            } catch (error) {
                console.error('加载GeoJSON数据失败:', error);
                // 使用备用地图
                createFallbackMap(chart);
                // 注意：createFallbackMap会处理加载状态和错误显示
            }
        }
        
        // 加载县区坐标数据
        async function loadCountyCoordinates() {
            try {
                console.log('开始加载县区坐标数据...');
                
                // 首先尝试从嵌入的JSON脚本标签加载数据
                const jsonScript = document.getElementById('map3dSampledData');
                if (jsonScript && jsonScript.textContent) {
                    try {
                        const data = JSON.parse(jsonScript.textContent);
                        countyCoordinates = {};
                        if (data.features && Array.isArray(data.features)) {
                            data.features.forEach(feature => {
                                if (feature.name && feature.center && Array.isArray(feature.center) && feature.center.length >= 2) {
                                    countyCoordinates[feature.name] = [feature.center[0], feature.center[1]];
                                }
                            });
                        }
                        console.log(`从嵌入数据加载县区坐标成功，共 ${Object.keys(countyCoordinates).length} 个县区`);
                        return;
                    } catch (parseError) {
                        console.warn('解析嵌入的县区坐标数据失败，尝试从文件加载:', parseError);
                    }
                }
                
                // 否则尝试从本地文件加载
                const url = 'map3d_sampled.json';
                const response = await fetch(url);
                if (!response.ok) throw new Error(`坐标数据加载失败: ${response.status}`);
                const data = await response.json();
                
                // 提取县区坐标映射
                countyCoordinates = {};
                if (data.features && Array.isArray(data.features)) {
                    data.features.forEach(feature => {
                        if (feature.name && feature.center && Array.isArray(feature.center) && feature.center.length >= 2) {
                            countyCoordinates[feature.name] = [feature.center[0], feature.center[1]];
                        }
                    });
                }

        // 加载当前月份的数据并显示
        async function loadCurrentMonthData(chart) {
            try {
                console.log(`加载当前月份数据: ${currentYear}-${currentMonth}`);
                
                // 检查数据是否存在
                if (!monthlyCarbonData[currentYear] || !monthlyCarbonData[currentYear][currentMonth]) {
                    console.warn(`没有找到 ${currentYear}年${currentMonth}月的数据，使用默认数据`);
                    // 尝试使用第一个可用的月份
                    const years = Object.keys(monthlyCarbonData);
                    if (years.length > 0) {
                        const firstYear = years[0];
                        const months = Object.keys(monthlyCarbonData[firstYear]);
                        if (months.length > 0) {
                            currentYear = firstYear;
                            currentMonth = months[0];
                            // 更新选择器
                            document.getElementById('yearSelect').value = currentYear;
                            document.getElementById('monthSelect').value = currentMonth;
                        }
                    }
                }
                
                const monthData = monthlyCarbonData[currentYear][currentMonth];
                const chartData = [];
                let totalCarbon = 0;
                let maxCarbon = -Infinity;
                let minCarbon = Infinity;
                let countyCount = 0;
                
                // 为每个有坐标的县区创建数据点
                for (const countyName in countyCoordinates) {
                    if (monthData[countyName] !== undefined) {
                        const carbonValue = monthData[countyName];
                        const coords = countyCoordinates[countyName];
                        chartData.push({
                            name: countyName,
                            value: [coords[0], coords[1], carbonValue],
                            carbon: carbonValue
                        });
                        
                        totalCarbon += carbonValue;
                        if (carbonValue > maxCarbon) maxCarbon = carbonValue;
                        if (carbonValue < minCarbon) minCarbon = carbonValue;
                        countyCount++;
                    }
                }
                
                const meanCarbon = countyCount > 0 ? totalCarbon / countyCount : 0;
                
                // 更新统计卡片
                updateStats({
                    countyCount: countyCount,
                    meanValue: meanCarbon,
                    maxValue: maxCarbon,
                    minValue: minCarbon
                });
                
                // 显示2D数据
                display2DData(chart, chartData);
                
                console.log(`当前月份数据加载完成，共 ${countyCount} 个县区`);
                
            } catch (error) {
                console.error('加载当前月份数据失败:', error);
                // 显示错误但不中断
                showError(`加载月份数据失败: ${error.message}`);
            }
        }

            });

       // 显示2D数据
function display2DData(chart, data) {
    console.log(`显示2D数据，共 ${data.length} 个点`);

    // 准备柱形图数据
    const barData = data.map(item => ({
        name: item.name,
        value: item.value
    }));

    // 定义数据范围（根据您的实际数据调整）
    const dataMin = 0;
    const dataMax = 360;
    const minHeight = 8;
    const maxHeight = 80;

    // 添加柱形图系列到现有图表
    chart.setOption({
        series: [
            {
                type: 'scatter',
                coordinateSystem: 'geo',
                data: barData,
                symbol: 'rect',
                symbolSize: function(val) {
                    const carbonValue = val[2];
                    const absValue = Math.abs(carbonValue);
                    // 线性映射高度
                    let height = minHeight + (absValue / dataMax) * (maxHeight - minHeight);
                    height = Math.max(minHeight, Math.min(maxHeight, height));
                    return [10, height];
                },
                symbolOffset: function(val) {
                    const carbonValue = val[2];
                    const absValue = Math.abs(carbonValue);
                    let height = minHeight + (absValue / dataMax) * (maxHeight - minHeight);
                    height = Math.max(minHeight, Math.min(maxHeight, height));
                    // 柱子底部对齐坐标点
                    return [0, -height / 2];
                },
                itemStyle: {
                    color: function(params) {
                        const val = params.data.value[2];
                        if (val < 0) {
                            // 负值：红色渐变
                            const intensity = Math.min(1, Math.abs(val) / 100);
                            return `rgba(255, ${Math.floor(100 * (1 - intensity))}, ${Math.floor(100 * (1 - intensity))}, 1)`;
                        } else {
                            // 正值：黄绿到深绿
                            const ratio = Math.min(1, val / dataMax);
                            const r = Math.floor(150 * (1 - ratio));
                            const g = Math.floor(255 - 75 * ratio);
                            const b = Math.floor(100 * (1 - ratio));
                            return `rgb(${r}, ${g}, ${b})`;
                        }
                    },
                    borderColor: '#fff',
                    borderWidth: 0.5,
                    shadowBlur: 6,
                    shadowColor: 'rgba(0, 0, 0, 0.4)',
                    shadowOffsetX: 1,
                    shadowOffsetY: 2
                },
                emphasis: {
                    itemStyle: {
                        borderColor: '#fff',
                        borderWidth: 2,
                        shadowBlur: 10,
                        shadowColor: 'rgba(0, 255, 255, 0.8)'
                    }
                },
                zlevel: 2,
                label: {
                    show: false
                }
            }
        ]
    });
}
        // 显示3D数据
        function display3DData(chart, data) {
            console.log(`显示3D数据，共 ${data.length} 个点`);
            
            // 准备3D柱状图数据
            const bar3DData = data.map(item => ({
                name: item.name,
                value: item.value,
                carbon: item.carbon,
                itemStyle: {
                    color: get3DColor(item.carbon)
                }
            }));
            
            // 添加3D柱状图系列
            chart.setOption({
                series: [
                    {
                        type: 'bar3D',
                        data: bar3DData,
                        barSize: 1.5, // 柱状条尺寸
                        bevelSize: 0.3, // 斜面尺寸，增加立体感
                        bevelSmoothness: 2, // 斜面平滑度
                        shading: 'lambert', // 着色方式，增加立体感
                        label: {
                            show: false
                        },
                        emphasis: {
                            label: {
                                show: true,
                                formatter: function(params) {
                                    return `${params.data.name}\n${params.data.value[2].toFixed(1)}`;
                                },
                                position: 'top',
                                textStyle: {
                                    color: '#fff',
                                    fontSize: 12,
                                    backgroundColor: 'rgba(0,0,0,0.7)',
                                    padding: [4, 6],
                                    borderRadius: 4
                                }
                            },
                            itemStyle: {
                                color: function(params) {
                                    return get3DColor(bar3DData[params.dataIndex].carbon, true);
                                }
                            }
                        },
                        itemStyle: {
                            opacity: 0.9,
                            borderWidth: 0.5,
                            borderColor: 'rgba(255,255,255,0.3)'
                        }
                    }
                ]
            });
            
            console.log('2D柱状图添加完成');
        }
        
        // 获取3D颜色
        function get3DColor(value, emphasis = false) {
            let baseColor;
            if (value <= 0) baseColor = '#ff6666';
            else if (value < 100) baseColor = '#ffcc00';
            else if (value < 250) baseColor = '#66ff66';
            else baseColor = '#00cc66';
            
            if (emphasis) {
                return lightenColor(baseColor, 30);
            }
            
            // 创建立体渐变
            return {
                type: 'linear',
                x: 0,
                y: 0,
                x2: 0,
                y2: 1,
                colorStops: [
                    {offset: 0, color: lightenColor(baseColor, 20)},
                    {offset: 0.7, color: baseColor},
                    {offset: 1, color: darkenColor(baseColor, 20)}
                ]
            };
        }
        
        // 获取2D颜色
        function get2DColor(value) {
            if (value <= 0) return '#ff6666';
            else if (value < 100) return '#ffcc00';
            else if (value < 250) return '#66ff66';
            else return '#00cc66';
        }
