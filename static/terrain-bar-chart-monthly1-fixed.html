<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>秦岭地形图与月度碳汇3D柱状图</title>
    <script>var __loadLog = [];</script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js" onload="__loadLog.push('echarts.min.js ✓')"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js" onload="__loadLog.push('echarts-gl.min.js ✓')"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a1931, #1a3c79);
            color: #fff;
            min-height: 100vh;
            padding: 10px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        h1 { font-size: 1.1rem; margin-bottom: 2px; color: #00dbde; }
        .subtitle { font-size: 0.75rem; opacity: 0.85; line-height: 1.3; }
        .month-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .year-month {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .month-selector label { font-size: 0.8rem; opacity: 0.9; white-space: nowrap; }
        select {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            min-width: 70px;
        }
        .toggle-btn {
            background: linear-gradient(135deg, #00dbde, #fc00ff);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .toggle-btn:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(0, 219, 222, 0.5); }
        .toggle-btn.playing { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .autoplay-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .speed-label { font-size: 0.75rem; opacity: 0.8; white-space: nowrap; }
        .speed-select {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            min-width: 50px;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0;
            justify-content: center;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 80px;
            text-align: center;
            flex: 1;
        }
        .stat-title { font-size: 0.75rem; opacity: 0.8; margin-bottom: 2px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: #00dbde; }
        .legend {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 6px 0;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; }
        .legend-color {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .map-container {
            width: 100%;
            height: 55vh;
            min-height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #map { width: 100%; height: 100%; }
        .info {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.75rem;
            opacity: 0.8;
            text-align: center;
            line-height: 1.5;
        }
        /* 全屏加载遮罩 */
        #app-loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a1931, #1a3c79);
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #app-loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00dbde;
            margin-bottom: 24px;
            text-shadow: 0 0 20px rgba(0, 219, 222, 0.5);
        }
        .loading-progress-container {
            width: 280px;
            max-width: 80vw;
            margin-bottom: 16px;
        }
        .loading-progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .loading-progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            border-radius: 4px;
            transition: width 0.4s ease;
            position: relative;
        }
        .loading-progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .loading-percent {
            text-align: center;
            font-size: 0.85rem;
            color: #00dbde;
            margin-bottom: 12px;
        }
        .loading-current-file {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            min-height: 1.2em;
            max-width: 280px;
            word-break: break-all;
        }
        .loading-current-file .file-icon {
            display: inline-block;
            width: 6px; height: 6px;
            background: #00dbde;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .loading-log {
            margin-top: 20px;
            max-height: 120px;
            overflow-y: auto;
            width: 280px;
            max-width: 80vw;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.35);
            line-height: 1.6;
        }
        .loading-log::-webkit-scrollbar { width: 3px; }
        .loading-log::-webkit-scrollbar-thumb { background: rgba(0,219,222,0.3); border-radius: 2px; }
        .loading-log .log-item.done { color: rgba(0, 219, 222, 0.5); }
        .loading-log .log-item.active { color: rgba(255, 255, 255, 0.7); }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 480px) {
            .month-selector {
                padding: 8px;
                gap: 6px;
            }
            .year-month {
                flex: 1 1 auto;
                justify-content: center;
            }
            select {
                min-width: 60px;
                font-size: 0.8rem;
                padding: 5px 8px;
            }
            .toggle-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
                width: 100%;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>
    <!-- 全屏加载进度条遮罩 -->
    <div id="app-loading-overlay">
        <div class="loading-logo">🏔️ 秦岭碳汇数据平台</div>
        <div class="loading-progress-container">
            <div class="loading-progress-bar-bg">
                <div class="loading-progress-bar-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="loading-percent" id="progressPercent">0%</div>
        <div class="loading-current-file" id="currentFileName">
            <span class="file-icon"></span>
            <span id="currentFileText">正在初始化...</span>
        </div>
        <div class="loading-log" id="loadingLog"></div>
    </div>

    <div class="container">
        <header>
            <h1>秦岭地形图与月度碳汇柱状图</h1>
            <div class="subtitle">底图为秦岭地形轮廓，上层为各县区碳汇值柱状图，支持按年月切换数据</div>
        </header>

        <div class="month-selector">
            <div class="year-month">
                <label for="yearSelect">年份:</label>
                <select id="yearSelect"></select>
            </div>
            <div class="year-month">
                <label for="monthSelect">月份:</label>
                <select id="monthSelect"></select>
            </div>
            <button id="updateBtn" class="toggle-btn">更新图表</button>
            <div class="autoplay-controls">
                <button id="autoPlayBtn" class="toggle-btn">▶ 自动播放</button>
                <label class="speed-label">速度:</label>
                <select id="speedSelect" class="speed-select">
                    <option value="2000">慢</option>
                    <option value="1000" selected>中</option>
                    <option value="500">快</option>
                    <option value="250">极快</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-title">县区数量</div>
                <div class="stat-value" id="data-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">平均碳汇值</div>
                <div class="stat-value" id="mean-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最高碳汇值</div>
                <div class="stat-value" id="max-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最低碳汇值</div>
                <div class="stat-value" id="min-value">-</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ff6666;"></div>
                <span>碳源/负值</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ffcc00;"></div>
                <span>低碳汇</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #66ff66;"></div>
                <span>高碳汇</span>
            </div>
        </div>

        <div class="map-container">
            <div id="map">
                <div id="loading" style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #00dbde; font-size: 14px;">
                    <div style="margin-bottom: 16px;">正在加载秦岭地形与碳汇数据...</div>
                    <div style="width: 40px; height: 40px; border: 4px solid rgba(0, 219, 222, 0.3); border-top: 4px solid #00dbde; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <div id="loading-details" style="margin-top: 16px; font-size: 12px; opacity: 0.8;"></div>
                </div>
                <div id="error" style="display: none; padding: 30px; text-align: center; color: #ff6666;">
                    <h3 style="margin-bottom: 12px;">地图加载失败</h3>
                    <p id="error-message" style="margin-bottom: 16px;"></p>
                    <button id="retry-btn" style="background: #00dbde; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">重试加载</button>
                </div>
            </div>
        </div>

        <div class="info">
            <p>蓝色区域：秦岭县区边界 | 彩色柱状条：碳汇值（红→碳源/负值，黄→低碳汇，绿→高碳汇）</p>
            <p>使用年份和月份选择器切换不同时期的数据，点击"更新图表"按钮刷新显示。</p>
        </div>
    </div>

    <script>
    // ========== 进度条系统 ==========
    var LoadProgress = {
        steps: [
            { key: 'echarts', label: 'ECharts 图表库', weight: 10 },
            { key: 'echarts-gl', label: 'ECharts-GL 3D引擎', weight: 5 },
            { key: 'geojson-download', label: '下载秦岭地形数据', weight: 10 },
            { key: 'geojson-parse', label: '解析地形数据', weight: 8 },
            { key: 'geojson-render', label: '渲染县区地图', weight: 12 },
            { key: 'map3d_sampled.json', label: '县区坐标数据 (map3d_sampled.json)', weight: 12 },
            { key: 'carbonData2.json', label: '本地碳汇数据 (carbonData2.json)', weight: 15 },
            { key: 'cloud-data', label: '云端碳汇数据', weight: 8 },
            { key: 'chart-render', label: '渲染图表', weight: 10 },
            { key: 'chart-labels', label: '标注县区名称', weight: 10 },
        ],
        completed: {},
        totalWeight: 0,
        _partialWeight: 0,

        init: function() {
            this.totalWeight = this.steps.reduce(function(sum, s) { return sum + s.weight; }, 0);
            if (typeof echarts !== 'undefined') this.done('echarts');
            if (typeof echarts !== 'undefined' && echarts.gl) this.done('echarts-gl');
            this.renderLog();
        },

        done: function(key) {
            if (this.completed[key]) return;
            this.completed[key] = true;
            this._partialWeight = 0;
            this.updateUI();
            this.addLogItem(this.getStep(key).label, 'done');
        },

        // 部分完成，用于大步骤中间更新
        partialDone: function(key, fraction) {
            var step = this.getStep(key);
            if (this.completed[key]) return;
            this._partialWeight = step.weight * fraction;
            this.updateUI();
        },

        active: function(key) {
            this.setCurrentFile(this.getStep(key).label);
            this.addLogItem(this.getStep(key).label, 'active');
        },

        // 仅更新当前文件名显示，不加日志
        setSubStatus: function(name) {
            this.setCurrentFile(name);
        },

        getStep: function(key) {
            return this.steps.find(function(s) { return s.key === key; }) || { key: key, label: key, weight: 0 };
        },

        getPercent: function() {
            var doneWeight = 0;
            var self = this;
            this.steps.forEach(function(s) {
                if (self.completed[s.key]) doneWeight += s.weight;
            });
            doneWeight += this._partialWeight;
            return Math.min(99, Math.round((doneWeight / self.totalWeight) * 100));
        },

        updateUI: function() {
            var pct = this.getPercent();
            var fill = document.getElementById('progressFill');
            var pctEl = document.getElementById('progressPercent');
            if (fill) fill.style.width = pct + '%';
            if (pctEl) pctEl.textContent = pct + '%';
        },

        setCurrentFile: function(name) {
            var el = document.getElementById('currentFileText');
            if (el) el.textContent = name;
        },

        addLogItem: function(name, status) {
            var logEl = document.getElementById('loadingLog');
            if (!logEl) return;
            var item = document.createElement('div');
            item.className = 'log-item ' + status;
            item.textContent = (status === 'done' ? '✓ ' : '⏳ ') + name;
            logEl.appendChild(item);
            logEl.scrollTop = logEl.scrollHeight;
        },

        renderLog: function() {
            var logEl = document.getElementById('loadingLog');
            if (!logEl) return;
            logEl.innerHTML = '';
            var self = this;
            this.steps.forEach(function(s) {
                var item = document.createElement('div');
                item.className = 'log-item ' + (self.completed[s.key] ? 'done' : '');
                item.textContent = (self.completed[s.key] ? '✓ ' : '○ ') + s.label;
                logEl.appendChild(item);
            });
        },

        finish: function() {
            var overlay = document.getElementById('app-loading-overlay');
            if (!overlay) return;
            var fill = document.getElementById('progressFill');
            var pctEl = document.getElementById('progressPercent');
            if (fill) fill.style.width = '100%';
            if (pctEl) pctEl.textContent = '100%';
            this.setCurrentFile('加载完成！');
            setTimeout(function() {
                overlay.classList.add('fade-out');
                setTimeout(function() { overlay.style.display = 'none'; }, 500);
            }, 300);
        }
    };

    // 全局变量
    let currentChart = null;
    let countyCoordinates = {};
    let monthlyCarbonData = {};
    let currentYear = '2022';
    let currentMonth = '1';

    // 颜色辅助函数
    function lightenColor(color, percent) {
        const num = parseInt(color.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = (num >> 16) + amt;
        const G = (num >> 8 & 0x00FF) + amt;
        const B = (num & 0x0000FF) + amt;
        return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
    }

    function darkenColor(color, percent) {
        const num = parseInt(color.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = (num >> 16) - amt;
        const G = (num >> 8 & 0x00FF) - amt;
        const B = (num & 0x0000FF) - amt;
        return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
    }

    // UI 状态
    function showLoading(message) {
        message = message || '正在加载秦岭地形与碳汇数据...';
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const detailsEl = document.getElementById('loading-details');
        if (loadingEl) loadingEl.style.display = 'flex';
        if (errorEl) errorEl.style.display = 'none';
        if (detailsEl) detailsEl.textContent = message;
    }

    function hideLoading() {
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.style.display = 'none';
        LoadProgress.finish();
    }

    function showError(message) {
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorMsgEl = document.getElementById('error-message');
        if (loadingEl) loadingEl.style.display = 'none';
        if (errorEl) errorEl.style.display = 'block';
        if (errorMsgEl) errorMsgEl.innerHTML = message;
    }

    // 重试按钮
    function setupRetryButton() {
        const retryBtn = document.getElementById('retry-btn');
        if (retryBtn) {
            retryBtn.onclick = function() {
                showLoading('正在重新加载数据...');
                setTimeout(function() { initMap(); }, 300);
            };
        }
    }

    // 动态生成年份和月份选择器（基于数据中实际存在的年月）
    function populateSelectors() {
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        if (!yearSelect || !monthSelect) return;

        // 生成年份选项（基于数据中存在的年份）
        const years = Object.keys(monthlyCarbonData).sort();
        yearSelect.innerHTML = '';
        if (years.length === 0) {
            // 无数据时显示默认范围
            for (let y = 2012; y <= 2024; y++) {
                const opt = document.createElement('option');
                opt.value = String(y);
                opt.textContent = String(y);
                if (String(y) === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            }
        } else {
            years.forEach(function(y) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                if (y === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            });
            // 如果当前年份不在数据中，选择最后一个年份
            if (!monthlyCarbonData[currentYear] && years.length > 0) {
                currentYear = years[years.length - 1];
                yearSelect.value = currentYear;
            }
        }

        // 生成月份选项（基于当前年份中有数据的月份）
        populateMonthSelectors();
    }

    // 根据当前年份生成月份选项
    function populateMonthSelectors() {
        const monthSelect = document.getElementById('monthSelect');
        if (!monthSelect) return;

        const yearData = monthlyCarbonData[currentYear];
        const months = yearData ? Object.keys(yearData).sort(function(a, b) { return parseInt(a) - parseInt(b); }) : [];

        monthSelect.innerHTML = '';
        if (months.length === 0) {
            // 无数据时显示12个月
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = String(m);
                opt.textContent = m + '月';
                if (String(m) === currentMonth) opt.selected = true;
                monthSelect.appendChild(opt);
            }
        } else {
            months.forEach(function(m) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = parseInt(m) + '月';
                if (m === currentMonth) opt.selected = true;
                monthSelect.appendChild(opt);
            });
            // 如果当前月份不在数据中，选择第一个月
            if (!yearData || !yearData[currentMonth]) {
                currentMonth = months[0];
                monthSelect.value = currentMonth;
            }
        }
    }

    // 控件设置
    function setupControls() {
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const updateBtn = document.getElementById('updateBtn');

        if (yearSelect) {
            yearSelect.addEventListener('change', function() {
                currentYear = this.value;
                populateMonthSelectors();
            });
        }
        if (monthSelect) {
            monthSelect.addEventListener('change', function() { currentMonth = this.value; });
        }
        if (updateBtn) {
            updateBtn.addEventListener('click', function() {
                if (currentChart) updateChartWithMonthlyData();
            });
        }
    }

    // ========== 自动播放 ==========
    var autoPlayTimer = null;
    var isAutoPlaying = false;
    var savedMapView = null; // 保存自动播放前的视图状态

    // 设置地图是否允许缩放平移
    function setMapRoam(enabled) {
        if (!currentChart) return;
        if (enabled) {
            // 恢复自动播放前的视图
            var opts = {
                geo: {
                    roam: true,
                    scaleLimit: { min: 1, max: 5 }
                }
            };
            if (savedMapView) {
                opts.geo.center = savedMapView.center;
                opts.geo.zoom = savedMapView.zoom;
            }
            currentChart.setOption(opts);
        } else {
            // 保存当前视图并锁定到最佳位置
            try {
                var option = currentChart.getOption();
                if (option.geo && option.geo[0]) {
                    savedMapView = {
                        center: option.geo[0].center || [108.5, 34.2],
                        zoom: option.geo[0].zoom || 1.2
                    };
                }
            } catch(e) {}
            currentChart.setOption({
                geo: {
                    roam: false,
                    center: [108.5, 34.1],
                    zoom: 1.15,
                    scaleLimit: { min: 1.15, max: 1.15 }
                }
            });
        }
    }

    function getAllYearMonths() {
        // 按时间顺序生成所有 有数据的年月列表
        var list = [];
        var years = Object.keys(monthlyCarbonData).sort();
        years.forEach(function(y) {
            var months = Object.keys(monthlyCarbonData[y]).sort(function(a, b) { return parseInt(a) - parseInt(b); });
            months.forEach(function(m) {
                list.push({ year: y, month: m });
            });
        });
        return list;
    }

    function startAutoPlay() {
        if (!currentChart) return;
        var list = getAllYearMonths();
        if (list.length === 0) return;

        // 找到当前位置
        var idx = -1;
        for (var i = 0; i < list.length; i++) {
            if (list[i].year === currentYear && list[i].month === currentMonth) {
                idx = i;
                break;
            }
        }
        if (idx === -1) idx = 0;

        isAutoPlaying = true;
        var btn = document.getElementById('autoPlayBtn');
        if (btn) { btn.textContent = '⏸ 暂停'; btn.classList.add('playing'); }
        setMapRoam(false);

        var speed = parseInt(document.getElementById('speedSelect').value) || 1000;

        function tick() {
            idx = (idx + 1) % list.length;
            currentYear = list[idx].year;
            currentMonth = list[idx].month;
            // 更新选择器
            var yearSel = document.getElementById('yearSelect');
            if (yearSel) yearSel.value = currentYear;
            populateMonthSelectors();
            var monthSel = document.getElementById('monthSelect');
            if (monthSel) monthSel.value = currentMonth;
            // 更新图表（静默，不显示loading）
            loadCurrentMonthData(currentChart);
        }

        autoPlayTimer = setInterval(tick, speed);
    }

    function stopAutoPlay() {
        if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }
        isAutoPlaying = false;
        setMapRoam(true);
        var btn = document.getElementById('autoPlayBtn');
        if (btn) { btn.textContent = '▶ 自动播放'; btn.classList.remove('playing'); }
    }

    function setupAutoPlayControls() {
        var btn = document.getElementById('autoPlayBtn');
        var speedSel = document.getElementById('speedSelect');
        if (btn) {
            btn.addEventListener('click', function() {
                if (isAutoPlaying) {
                    stopAutoPlay();
                } else {
                    startAutoPlay();
                }
            });
        }
        // 切换速度时重新启动
        if (speedSel) {
            speedSel.addEventListener('change', function() {
                if (isAutoPlaying) {
                    stopAutoPlay();
                    startAutoPlay();
                }
            });
        }
    }

    // 更新统计
    function updateStats(stats) {
        document.getElementById('data-count').textContent = stats.countyCount;
        document.getElementById('mean-value').textContent = stats.meanValue.toFixed(2);
        document.getElementById('max-value').textContent = stats.maxValue.toFixed(2);
        document.getElementById('min-value').textContent = stats.minValue.toFixed(2);
    }

    // 初始化地图
    function initMap() {
        showLoading('正在初始化地图...');
        if (currentChart) { currentChart.dispose(); currentChart = null; }
        if (typeof echarts === 'undefined') { showError('ECharts库未加载！请检查网络连接'); return; }
        const chartDom = document.getElementById('map');
        if (!chartDom) { showError('找不到地图容器'); return; }
        try {
            var myChart = echarts.init(chartDom);
            currentChart = myChart;
        } catch (error) {
            showError('ECharts初始化失败: ' + error.message);
            return;
        }
        init2DMap(myChart);
        window.addEventListener('resize', function() { myChart.resize(); });
    }

    // 初始化2D地图
    function init2DMap(chart) {
        var option = {
            backgroundColor: 'transparent',
            title: { show: false },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    if (params.seriesType === 'scatter') {
                        var data = params.data;
                        var name = data.name || '未知';
                        var carbon = (data.value && data.value.length > 2) ? data.value[2].toFixed(2) : '无数据';
                        return '<strong>' + name + '</strong><br/>碳汇值: <b>' + carbon + '</b>';
                    } else {
                        var countyName = params.name;
                        var yearData = monthlyCarbonData[currentYear];
                        var monthData = yearData ? yearData[currentMonth] : null;
                        var carbonValue = '无数据';
                        if (monthData && monthData[countyName] !== undefined) carbonValue = monthData[countyName].toFixed(2);
                        return '<strong>' + countyName + '</strong><br/>碳汇值: <b>' + carbonValue + '</b>';
                    }
                },
                backgroundColor: 'rgba(0,0,0,0.8)',
                textStyle: { color: '#fff' }
            },
            visualMap: { show: false }
        };
        try { chart.setOption(option); } catch (e) { chart.setOption({ backgroundColor: 'transparent' }); }
        loadGeoJSON(chart);
    }

    // 加载GeoJSON
    async function loadGeoJSON(chart) {
        LoadProgress.active('geojson-download');
        LoadProgress.setSubStatus('正在下载秦岭地形数据 (qinling.geojson)...');
        try {
            // 带进度跟踪的下载
            var response = await fetch('qinling.geojson');
            var contentLength = response.headers.get('content-length');
            var total = parseInt(contentLength) || 0;

            var geoJSON;
            if (total > 0 && typeof ReadableStream !== 'undefined') {
                // 流式下载，实时更新进度
                var reader = response.body.getReader();
                var chunks = [];
                var received = 0;
                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    chunks.push(result.value);
                    received += result.value.length;
                    var downloadPct = Math.min(received / total, 1);
                    LoadProgress.partialDone('geojson-download', downloadPct);
                    var mb = (received / 1024 / 1024).toFixed(1);
                    var totalMb = (total / 1024 / 1024).toFixed(1);
                    LoadProgress.setSubStatus('正在下载秦岭地形数据... ' + mb + 'MB / ' + totalMb + 'MB');
                }
                var allChunks = new Uint8Array(received);
                var pos = 0;
                chunks.forEach(function(chunk) {
                    allChunks.set(chunk, pos);
                    pos += chunk.length;
                });
                geoJSON = JSON.parse(new TextDecoder().decode(allChunks));
            } else {
                geoJSON = await response.json();
            }
            LoadProgress.done('geojson-download');

            // 解析阶段
            LoadProgress.active('geojson-parse');
            LoadProgress.setSubStatus('正在解析地形数据，共 ' + geoJSON.features.length + ' 个县区...');
            if (geoJSON.crs) delete geoJSON.crs;
            var countyNames = [];
            geoJSON.features.forEach(function(feature) {
                if (feature.properties && feature.properties.NAME && !feature.properties.name) {
                    feature.properties.name = feature.properties.NAME;
                }
                if (feature.properties && feature.properties.name) {
                    countyNames.push(feature.properties.name);
                }
            });
            LoadProgress.done('geojson-parse');

            // 渲染阶段 - 逐个显示县区名称
            LoadProgress.active('geojson-render');
            echarts.registerMap('qinling', geoJSON, { nameProperty: 'name' });
            for (var ci = 0; ci < countyNames.length; ci++) {
                var shortName = countyNames[ci].replace(/(区|县)$/, '');
                LoadProgress.setSubStatus('正在渲染县区: ' + shortName + ' (' + (ci + 1) + '/' + countyNames.length + ')');
                LoadProgress.partialDone('geojson-render', (ci + 1) / countyNames.length);
            }
            LoadProgress.done('geojson-render');

            chart.setOption({
                geo: {
                    map: 'qinling',
                    center: [108.5, 34.2],
                    zoom: 1.2,
                    scaleLimit: { min: 1, max: 5 },
                    top: '10%',
                    itemStyle: {
                        areaColor: '#e8f4ff',
                        borderColor: '#b3d9ff',
                        borderWidth: 0.5,
                        shadowColor: 'rgba(100, 150, 255, 0.3)',
                        shadowBlur: 5,
                        shadowOffsetX: 2,
                        shadowOffsetY: 2
                    },
                    tooltip: {
                        show: true,
                        formatter: function(params) {
                            var countyName = params.name;
                            var yearData = monthlyCarbonData[currentYear];
                            var monthData = yearData ? yearData[currentMonth] : null;
                            var carbonValue = '无数据';
                            if (monthData && monthData[countyName] !== undefined) carbonValue = monthData[countyName].toFixed(2);
                            return '<strong>' + countyName + '</strong><br/>碳汇值: <b>' + carbonValue + '</b>';
                        },
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        textStyle: { color: '#fff' }
                    },
                    emphasis: { itemStyle: { areaColor: '#3a9ef9' }, label: { show: false } },
                    roam: true,
                    label: {
                        show: false
                    }
                }
            });
            showLoading('地形图加载成功，正在加载数据...');
            await Promise.all([loadCountyCoordinates(), loadMonthlyCarbonData()]);
            await loadCurrentMonthData(chart);
            hideLoading();
        } catch (error) {
            console.error('加载失败:', error);
            createFallbackMap(chart);
        }
    }

    // 加载县区坐标
    async function loadCountyCoordinates() {
        LoadProgress.active('map3d_sampled.json');
        LoadProgress.setSubStatus('正在下载县区坐标数据...');
        try {
            var data = await fetch('map3d_sampled.json').then(function(r) { return r.json(); });
            countyCoordinates = {};
            var coordCount = 0;
            if (data.features && Array.isArray(data.features)) {
                data.features.forEach(function(feature) {
                    if (feature.name && feature.center && Array.isArray(feature.center) && feature.center.length >= 2) {
                        countyCoordinates[feature.name] = [feature.center[0], feature.center[1]];
                        coordCount++;
                    }
                });
            }
            LoadProgress.setSubStatus('已加载 ' + coordCount + ' 个县区坐标');
            LoadProgress.done('map3d_sampled.json');
        } catch (error) {
            console.error('加载坐标数据失败:', error);
            LoadProgress.done('map3d_sampled.json');
            countyCoordinates = {
                "宁陕县": [108.44010930177312, 33.53151179528448],
                "丹凤县": [110.43133507960304, 33.67967447584821],
                "柞水县": [109.27342486656763, 33.68234258606788],
                "长安区": [108.94751031794558, 34.16420212456797],
                "鄠邑区": [108.60558057412175, 34.11160938183645],
                "蓝田县": [109.31746211707544, 34.15624502339996],
                "周至县": [108.2224902417701, 34.16420212456797],
                "太白县": [107.31953691254175, 34.05924480890543],
                "商州区": [109.93765491183952, 33.87061739333576],
                "洛南县": [110.14573240586154, 34.09180968297678]
            };
        }
    }

    // 加载月度碳汇数据
    async function loadMonthlyCarbonData() {
        LoadProgress.active('carbonData2.json');
        LoadProgress.setSubStatus('正在下载碳汇数据...');
        try {
            // 先加载本地静态数据
            monthlyCarbonData = await fetch('carbonData2.json').then(function(r) { return r.json(); });
            LoadProgress.done('carbonData2.json');

            // 再尝试从云存储加载最新数据并合并
            LoadProgress.active('cloud-data');
            try {
                var cloudDataUrl = 'https://cloudbase-8gdof83j7fdc6094.tcb.qcloud.la/qinling-carbon-data/web/carbonData2.json';
                var cloudData = await fetch(cloudDataUrl + '?t=' + Date.now()).then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                });
                // 合并云端数据到本地数据（云端数据优先）
                if (cloudData && typeof cloudData === 'object') {
                    for (var year in cloudData) {
                        if (!monthlyCarbonData[year]) {
                            monthlyCarbonData[year] = cloudData[year];
                        } else {
                            for (var month in cloudData[year]) {
                                monthlyCarbonData[year][month] = cloudData[year][month];
                            }
                        }
                    }
                    console.log('已合并云端数据，年份: ' + Object.keys(monthlyCarbonData).sort().join(', '));
                }
                LoadProgress.done('cloud-data');
            } catch (cloudErr) {
                console.log('云端数据加载失败，使用本地数据:', cloudErr.message);
                LoadProgress.done('cloud-data');
            }

            // 数据加载后动态生成年月选择器
            populateSelectors();
        } catch (error) {
            console.error('加载月度数据失败:', error);
            monthlyCarbonData = { "2022": { "1": { "宁陕县": 150, "丹凤县": 200, "柞水县": 180 } } };
            populateSelectors();
        }
    }

    // 加载当前月份数据
    async function loadCurrentMonthData(chart) {
        LoadProgress.active('chart-render');
        LoadProgress.setSubStatus('正在渲染 ' + currentYear + '年' + currentMonth + '月图表...');
        try {
            // 检查当前选中年月是否有数据，如果没有则选择最后一个有数据的年月
            if (!monthlyCarbonData[currentYear] || !monthlyCarbonData[currentYear][currentMonth]) {
                var years = Object.keys(monthlyCarbonData).sort();
                if (years.length > 0) {
                    currentYear = years[years.length - 1];
                    var months = Object.keys(monthlyCarbonData[currentYear]).sort(function(a, b) { return parseInt(a) - parseInt(b); });
                    if (months.length > 0) {
                        currentMonth = months[0];
                    }
                    var yearSelect = document.getElementById('yearSelect');
                    if (yearSelect) yearSelect.value = currentYear;
                    populateMonthSelectors();
                }
            }
            var monthData = monthlyCarbonData[currentYear][currentMonth];
            var chartData = [];
            var totalCarbon = 0, maxCarbon = -Infinity, minCarbon = Infinity, countyCount = 0;
            for (var countyName in countyCoordinates) {
                if (monthData[countyName] !== undefined) {
                    var carbonValue = monthData[countyName];
                    var coords = countyCoordinates[countyName];
                    chartData.push({ name: countyName, value: [coords[0], coords[1], carbonValue], carbon: carbonValue });
                    totalCarbon += carbonValue;
                    if (carbonValue > maxCarbon) maxCarbon = carbonValue;
                    if (carbonValue < minCarbon) minCarbon = carbonValue;
                    countyCount++;
                }
            }
            var meanCarbon = countyCount > 0 ? totalCarbon / countyCount : 0;
            LoadProgress.done('chart-render');

            // 标注县区名称
            LoadProgress.active('chart-labels');
            var displayNames = chartData.map(function(d) { return d.name.replace(/(区|县)$/, ''); });
            LoadProgress.setSubStatus('正在标注: ' + displayNames.slice(0, 5).join('、') + (displayNames.length > 5 ? '...' : ''));

            updateStats({ countyCount: countyCount, meanValue: meanCarbon, maxValue: maxCarbon, minValue: minCarbon });
            display2DData(chart, chartData);
            LoadProgress.done('chart-labels');
        } catch (error) {
            console.error('加载月份数据失败:', error);
            showError('加载数据失败: ' + error.message);
        }
    }

    // 更新图表
    function updateChartWithMonthlyData() {
        if (!currentChart) return;
        showLoading('正在加载 ' + currentYear + '年' + currentMonth + '月数据...');
        loadCurrentMonthData(currentChart).then(function() { hideLoading(); }).catch(function() { hideLoading(); });
    }

    // 显示2D数据
    function display2DData(chart, data) {
        var barData = data.map(function(item) { return { name: item.name, value: item.value }; });
        chart.setOption({
            animation: true,
            animationDuration: 900,
            animationEasing: 'backOut',
            animationDurationUpdate: 800,
            animationEasingUpdate: 'cubicInOut',
            series: [{
                type: 'scatter',
                coordinateSystem: 'geo',
                data: barData,
                // 圆角柱状符号，简约美观
                symbol: 'path://M0.1,0 L0.9,0 Q0.98,0 0.98,0.1 L0.98,0.88 Q0.98,1 0.9,1 L0.1,1 Q0.02,1 0.02,0.88 L0.02,0.1 Q0.02,0 0.1,0 Z',
                symbolSize: function(val) {
                    var h = Math.max(4, Math.min(42, Math.abs(val[2]) / 8));
                    return [10, h];
                },
                symbolOffset: function(val) {
                    var h = Math.max(4, Math.min(42, Math.abs(val[2]) / 8));
                    return [0, -h / 2];
                },
                itemStyle: {
                    color: function(params) {
                        var val = params.data.value[2];
                        var baseColor;
                        if (val <= 0) baseColor = '#ff6666';
                        else if (val < 100) baseColor = '#ffcc00';
                        else if (val < 250) baseColor = '#66ff66';
                        else baseColor = '#00cc66';
                        return {
                            type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: lightenColor(baseColor, 20) },
                                { offset: 0.55, color: baseColor },
                                { offset: 1, color: darkenColor(baseColor, 20) }
                            ]
                        };
                    },
                    opacity: 0.93,
                    borderColor: 'rgba(255,255,255,0.25)',
                    borderWidth: 0.5,
                    shadowBlur: 7,
                    shadowColor: 'rgba(0, 0, 0, 0.5)',
                    shadowOffsetX: 2,
                    shadowOffsetY: 3
                },
                emphasis: {
                    itemStyle: {
                        borderColor: '#fff',
                        borderWidth: 2,
                        shadowBlur: 10,
                        shadowColor: 'rgba(0, 219, 222, 0.7)'
                    }
                },
                zlevel: 2,
                label: {
                    show: false
                }
            }]
        });
    }

    // 备用地图
    function createFallbackMap(chart) {
        var fallbackGeoJSON = {
            type: "FeatureCollection",
            features: [{ type: "Feature", properties: { name: "秦岭区域" }, geometry: { type: "Polygon", coordinates: [[[105, 32], [111, 32], [111, 35], [105, 35], [105, 32]]] } }]
        };
        try {
            echarts.registerMap('qinling', fallbackGeoJSON);
            chart.setOption({
                geo: {
                    map: 'qinling', center: [108.5, 34.2], zoom: 1.3,
                    itemStyle: { areaColor: '#e8f4ff', borderColor: '#b3d9ff', borderWidth: 0.5 },
                    roam: true, label: { show: false }
                }
            });
            Promise.all([loadCountyCoordinates(), loadMonthlyCarbonData()]).then(function() {
                return loadCurrentMonthData(chart);
            }).then(function() { hideLoading(); }).catch(function() { hideLoading(); });
        } catch (error) {
            showError('地图加载失败');
            hideLoading();
        }
    }

    // 页面加载
    window.addEventListener('load', function() {
        LoadProgress.init();
        setupRetryButton();
        setupControls();
        setupAutoPlayControls();
        initMap();
    });
    </script>
