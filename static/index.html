<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秦岭碳汇 3D 地形可视化</title>

    <!-- Bootstrap 3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Chroma.js 用于颜色映射 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        /* 顶部导航栏 */
        .navbar {
            margin-bottom: 0;
            border-radius: 0;
            background-color: #1a1a2e;
            border: none;
            color: #eee;
        }
        .navbar-brand {
            color: #f0f0f0 !important;
            font-weight: bold;
            font-size: 20px;
        }
        .navbar-nav > li > a {
            color: #ccc !important;
        }
        .navbar-nav > li > a:hover {
            color: white !important;
            background-color: #16213e !important;
        }

        /* 地图容器 */
        #map {
            width: 100%;
            height: calc(100vh - 52px);
        }

        /* 左侧工具栏 */
        .toolbox-left {
            position: absolute;
            left: 12px;
            top: 80px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 时间选择器面板 */
        .time-panel {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px;
            color: #ddd;
        }
        .time-panel select {
            width: 100%;
            margin-bottom: 6px;
            padding: 4px;
            background: #2a2a3a;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }

        /* 工具按钮 */
        .tool-btn {
            width: 42px;
            height: 42px;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #555;
            color: #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
        }
        .tool-btn:hover {
            background: rgba(30, 60, 90, 0.9);
            border-color: #888;
            color: white;
        }

        /* 右侧图例 */
        .legend-panel {
            position: absolute;
            right: 20px;
            bottom: 80px;
            z-index: 1000;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(8px);
            padding: 12px 14px;
            border-radius: 8px;
            color: #ccc;
            font-size: 13px;
            border: 1px solid #444;
            width: 170px;
        }
        .legend-gradient {
            height: 20px;
            margin: 6px 0;
            border-radius: 4px;
        }
        .legend-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">🌄 秦岭碳汇 3D 地形</a>
            </div>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="#"><i class="fa fa-info-circle"></i> 关于</a></li>
                <li><a href="#"><i class="fa fa-download"></i> 数据</a></li>
            </ul>
        </div>
    </nav>

    <!-- 地图容器 -->
    <div id="map"></div>

    <!-- 左侧工具栏 -->
    <div class="toolbox-left">
        <!-- 时间选择 -->
        <div class="time-panel">
            <label>年份</label>
            <select id="yearSelect"></select>
            <label>月份</label>
            <select id="monthSelect"></select>
        </div>
        <!-- 缩放按钮 -->
        <div class="tool-btn" id="zoomInBtn" title="放大"><i class="fa fa-plus"></i></div>
        <div class="tool-btn" id="zoomOutBtn" title="缩小"><i class="fa fa-minus"></i></div>
        <!-- 重置视图 -->
        <div class="tool-btn" id="resetViewBtn" title="重置视图"><i class="fa fa-home"></i></div>
    </div>

    <!-- 右侧图例 -->
    <div class="legend-panel" id="legendPanel">
        <div style="text-align:center; font-weight:bold; margin-bottom:4px;">碳汇强度</div>
        <div class="legend-gradient" id="legendGradient"></div>
        <div class="legend-labels" id="legendLabels">
            <span id="minValue">-10</span>
            <span id="maxValue">10</span>
        </div>
        <div style="margin-top:6px; font-size:11px; opacity:0.8;">（单位：gC·m⁻²·月⁻¹）</div>
    </div>

    <!-- 加载本地数据文件 -->
    <script src="qinling-geojson.js"></script>
    <script src="monthlyCarbonData.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 等待全局数据加载完成
        (function() {
            if (!window.qinlingGeoJSON || !window.monthlyCarbonData) {
                alert('错误：未找到 qinlingGeoJSON 或 monthlyCarbonData，请确保数据文件存在且格式正确。');
                return;
            }

            // ---- 初始化地图，使用 OpenTopoMap 地形底图 ----
            const map = L.map('map', {
                center: [33.8, 108.2],   // 秦岭中心经纬度
                zoom: 8,
                zoomControl: false,      // 隐藏默认缩放控件，用自定义按钮
                attributionControl: true
            });

            L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                maxZoom: 17,
                attribution: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a> contributors'
            }).addTo(map);

            // 添加比例尺
            L.control.scale({ position: 'bottomleft', imperial: false }).addTo(map);

            // ---- 全局变量 ----
            let geoLayer;               // 当前显示的 GeoJSON 图层
            let currentYear, currentMonth;
            let data = window.monthlyCarbonData;
            const geojson = window.qinlingGeoJSON;

            // ---- 准备时间选择器选项 ----
            const years = Object.keys(data).sort();
            const months = Array.from({ length: 12 }, (_, i) => String(i + 1));

            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');

            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                yearSelect.appendChild(opt);
            });

            months.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m + '月';
                monthSelect.appendChild(opt);
            });

            // 默认设置最近年份的第一月
            currentYear = years[years.length - 1];
            currentMonth = '1';
            yearSelect.value = currentYear;
            monthSelect.value = currentMonth;

            // ---- 颜色映射 (使用 Chroma.js) ----
            // 碳汇负值表示释放？这里假设数值越大碳汇越强，使用白-绿-深绿渐变
            const colorScale = chroma.scale(['#f7fcf5', '#4daf4a', '#00441b'])
                .mode('lab')
                .classes(7);

            // 获取指定县的值，无数据返回 null
            function getCountyValue(countyName, year, month) {
                try {
                    const yearData = data[year];
                    if (!yearData) return null;
                    const monthData = yearData[month];
                    if (!monthData) return null;
                    return monthData[countyName] !== undefined ? monthData[countyName] : null;
                } catch (e) {
                    return null;
                }
            }

            // 计算当前视角下所有区域的值范围
            function computeRange(year, month) {
                let min = Infinity, max = -Infinity;
                geojson.features.forEach(f => {
                    const val = getCountyValue(f.properties.NAME, year, month);
                    if (val !== null && !isNaN(val)) {
                        if (val < min) min = val;
                        if (val > max) max = val;
                    }
                });
                // 如果所有值都相同或无数据，设默认范围
                if (min === Infinity) return { min: 0, max: 1 };
                if (min === max) return { min: min - 0.1, max: max + 0.1 };
                return { min, max };
            }

            // 更新图例
            function updateLegend(range) {
                const { min, max } = range;
                document.getElementById('minValue').textContent = min.toFixed(2);
                document.getElementById('maxValue').textContent = max.toFixed(2);
                const gradient = document.getElementById('legendGradient');
                // 使用 chroma 生成渐变色
                const steps = colorScale.colors(7);
                gradient.style.background = `linear-gradient(to right, ${steps.join(', ')})`;
            }

            // 样式函数
            function styleFeature(feature) {
                const val = getCountyValue(feature.properties.NAME, currentYear, currentMonth);
                return {
                    fillColor: val !== null && !isNaN(val) ? colorScale(val).hex() : '#aaaaaa',
                    weight: 1.5,
                    opacity: 1,
                    color: '#333',
                    fillOpacity: 0.75
                };
            }

            // 点击弹窗
            function onEachFeature(feature, layer) {
                if (feature.properties && feature.properties.NAME) {
                    const name = feature.properties.NAME;
                    const val = getCountyValue(name, currentYear, currentMonth);
                    const popupContent = `<b>${name}</b><br/>碳汇: ${val !== null ? val.toFixed(2) : '无数据'}`;
                    layer.bindPopup(popupContent, { offset: L.point(0, -5) });
                }
            }

            // 加载或刷新 GeoJSON 图层
            function loadGeoLayer() {
                if (geoLayer) {
                    map.removeLayer(geoLayer);
                }
                geoLayer = L.geoJSON(geojson, {
                    style: styleFeature,
                    onEachFeature: onEachFeature
                }).addTo(map);

                // 计算范围并更新图例
                const range = computeRange(currentYear, currentMonth);
                updateLegend(range);
            }

            // 时间选择变化事件
            function onTimeChange() {
                currentYear = yearSelect.value;
                currentMonth = monthSelect.value;
                // 如果当前年月无数据，重置样式（但保留图层）
                if (geoLayer) {
                    geoLayer.eachLayer(layer => {
                        if (layer.feature && layer.feature.properties) {
                            const val = getCountyValue(layer.feature.properties.NAME, currentYear, currentMonth);
                            const color = val !== null && !isNaN(val) ? colorScale(val).hex() : '#aaaaaa';
                            layer.setStyle({
                                fillColor: color,
                                fillOpacity: 0.75
                            });
                            // 更新弹窗内容
                            const name = layer.feature.properties.NAME;
                            layer.bindPopup(`<b>${name}</b><br/>碳汇: ${val !== null ? val.toFixed(2) : '无数据'}`, { offset: L.point(0, -5) });
                        }
                    });
                    // 更新图例
                    const range = computeRange(currentYear, currentMonth);
                    updateLegend(range);
                }
            }

            yearSelect.addEventListener('change', onTimeChange);
            monthSelect.addEventListener('change', onTimeChange);

            // 自定义缩放按钮
            document.getElementById('zoomInBtn').onclick = () => map.zoomIn();
            document.getElementById('zoomOutBtn').onclick = () => map.zoomOut();
            document.getElementById('resetViewBtn').onclick = () => {
                map.setView([33.8, 108.2], 8);
            };

            // 初始加载
            loadGeoLayer();
        })();
    </script>
</body>
</html>
