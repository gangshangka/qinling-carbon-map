<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秦岭碳汇 3D 遥感地球</title>

    <!-- Cesium 1.120 -->
    <link rel="stylesheet" href="https://unpkg.com/cesium@1.120.0/Build/Cesium/Widgets/widgets.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; overflow: hidden; }
        /* 让地球整体偏白偏亮 */
        #cesiumContainer canvas { filter: brightness(1.15) saturate(0.75); }
        .navbar {
            position: absolute; top: 0; width: 100%; z-index: 2000;
            background: rgba(255,255,255,0.72); backdrop-filter: blur(14px); border: none; border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .navbar-brand { color: #2c3e50 !important; font-weight: bold; font-size: 18px !important; letter-spacing: 1px; }
        .navbar-nav > li > a { color: #555 !important; }
        .navbar-nav > li > a:hover { color: #2c3e50 !important; }
        .toolbox-left {
            position: absolute; left: 12px; top: 70px; z-index: 1500; display: flex; flex-direction: column; gap: 8px;
        }
        .card-panel {
            background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; padding: 12px; color: #333;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card-panel label { font-size: 12px; color: #777; margin-bottom: 2px; display: block; }
        .card-panel select, .card-panel button { margin: 4px 0; width: 100%; padding: 6px; background: #f5f6f8; color: #333; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        .tool-btn {
            width: 42px; height: 42px; background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); border: 1px solid rgba(0,0,0,0.08); color: #555;
            border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.2s ease;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.95); border-color: #bbb; color: #2c3e50; box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
        .legend {
            position: absolute; right: 20px; bottom: 100px; z-index: 1500;
            background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); padding: 14px 16px; border-radius: 10px; color: #444;
            font-size: 13px; border: 1px solid rgba(0,0,0,0.08); width: 180px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .legend .bar { height: 20px; margin: 6px 0; border-radius: 4px; background: linear-gradient(to right, #f7fcf5, #4daf4a, #00441b); }
        .legend .labels { display: flex; justify-content: space-between; font-size: 11px; }

        /* 碳汇浮动信息面板 */
        .carbon-popup {
            position: absolute; z-index: 3000; pointer-events: none;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
            border: 1px solid rgba(0,0,0,0.08); border-radius: 12px;
            padding: 16px 20px; min-width: 200px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            opacity: 0; transform: translateY(8px) scale(0.96);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .carbon-popup.visible {
            opacity: 1; transform: translateY(0) scale(1);
        }
        .carbon-popup .popup-title {
            font-size: 16px; font-weight: 600; color: #2c3e50; margin-bottom: 8px;
            padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .carbon-popup .popup-value {
            font-size: 28px; font-weight: 700; color: #27ae60;
            line-height: 1.2;
        }
        .carbon-popup .popup-unit {
            font-size: 12px; color: #999; margin-top: 4px;
        }
        .carbon-popup .popup-close {
            position: absolute; top: 8px; right: 12px; cursor: pointer; pointer-events: auto;
            color: #aaa; font-size: 16px; transition: color 0.2s;
        }
        .carbon-popup .popup-close:hover { color: #555; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">🛰️ 秦岭碳汇 3D 遥感</a>
            </div>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="#"><i class="fa fa-info-circle"></i> 帮助</a></li>
                <li><a href="#"><i class="fa fa-download"></i> 数据</a></li>
            </ul>
        </div>
    </nav>

    <div id="cesiumContainer"></div>

    <!-- 碳汇浮动信息面板 -->
    <div class="carbon-popup" id="carbonPopup">
        <div class="popup-close" id="popupClose"><i class="fa fa-times"></i></div>
        <div class="popup-title" id="popupTitle">--</div>
        <div class="popup-value" id="popupValue">--</div>
        <div class="popup-unit">gC·m⁻²·month⁻¹</div>
    </div>

    <div class="toolbox-left">
        <div class="card-panel">
            <label>年份</label>
            <select id="yearSelect"></select>
            <label>月份</label>
            <select id="monthSelect"></select>
        </div>
        <div class="tool-btn" id="zoomIn" title="放大"><i class="fa fa-plus"></i></div>
        <div class="tool-btn" id="zoomOut" title="缩小"><i class="fa fa-minus"></i></div>
        <div class="tool-btn" id="resetView" title="重置视角"><i class="fa fa-home"></i></div>
    </div>

    <div class="legend" id="legendPanel">
        <div style="text-align:center; font-weight:bold; margin-bottom:4px;">碳汇强度</div>
        <div class="bar" id="colorBar"></div>
        <div class="labels">
            <span id="minVal">-10</span>
            <span id="maxVal">10</span>
        </div>
        <div style="margin-top:6px; font-size:11px; opacity:0.7;">单位: gC·m⁻²·month⁻¹</div>
    </div>

    <script src="https://unpkg.com/cesium@1.120.0/Build/Cesium/Cesium.js"></script>
    <script>
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0YmY0Y2JjYS1kZDhjLTQzMmEtYThmNy0zOWQyNmNlMmEzYWMiLCJpZCI6NDIzMzA0LCJpYXQiOjE3NzcwODQ4MTN9.5IebdRrbJ2GRjaVP8WuPpK1NjOKohXG5J-dfkx86dTA';

        (async function() {
            const [geoJSON, carbonData] = await Promise.all([
                fetch('https://cdn.jsdelivr.net/gh/gangshangka/qinling-carbon-map@carbon-map/static/data/qinling.geojson').then(r => r.json()),
                fetch('https://cdn.jsdelivr.net/gh/gangshangka/qinling-carbon-map@carbon-map/static/data/carbonData2.json').then(r => r.json())
            ]);

            const viewer = new Cesium.Viewer('cesiumContainer', {
                terrainProvider: await Cesium.CesiumTerrainProvider.fromIonAssetId(1, {
                    requestVertexNormals: true,
                    requestWaterMask: false
                }),
                imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                    url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                }),
                animation: false,
                timeline: false,
                fullscreenButton: false,
                homeButton: false,
                sceneModePicker: false,
                baseLayerPicker: false,
                navigationHelpButton: false,
                geocoder: false,
                infoBox: false,
                selectionIndicator: false
            });

            // 降低大气蓝光散射，让地球更白亮
            const scene = viewer.scene;
            scene.skyAtmosphere.brightnessShift = 0.3;    // 提亮大气
            scene.skyAtmosphere.saturationShift = -0.35;  // 降低蓝色饱和度
            scene.fog.enabled = true;
            scene.fog.density = 0.0002;
            scene.globe.enableLighting = true;
            scene.globe.atmosphereLightIntensity = 8.0;   // 增强大气散射亮度
            // 降低海洋深度颜色
            scene.globe.showGroundAtmosphere = true;
            try { scene.globe.baseColor = Cesium.Color.WHITE.withAlpha(0.6); } catch(e) {}
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(108.2, 33.8, 250000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-70), roll: 0 }
            });

            const dataSource = await Cesium.GeoJsonDataSource.load(geoJSON, {
                stroke: Cesium.Color.DARKGRAY,
                fill: Cesium.Color.GRAY.withAlpha(0.3),
                strokeWidth: 2
            });
            viewer.dataSources.add(dataSource);
            const entities = dataSource.entities.values;

            // 时间选择
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            const years = Object.keys(carbonData).sort();
            const months = Array.from({length: 12}, (_, i) => String(i + 1));
            years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yearSelect.appendChild(o); });
            months.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m + '月'; monthSelect.appendChild(o); });

            let currentYear = years[years.length - 1];
            let currentMonth = '1';
            yearSelect.value = currentYear;
            monthSelect.value = currentMonth;

            function getCountyValue(name, year, month) {
                try {
                    const yd = carbonData[year];
                    if (!yd) return null;
                    const md = yd[month];
                    if (!md) return null;
                    return md[name] !== undefined ? md[name] : null;
                } catch { return null; }
            }

            function computeRange(year, month) {
                let min = Infinity, max = -Infinity;
                geoJSON.features.forEach(f => {
                    const v = getCountyValue(f.properties.NAME, year, month);
                    if (v !== null && !isNaN(v)) { if (v < min) min = v; if (v > max) max = v; }
                });
                if (min === Infinity) return { min: 0, max: 1 };
                if (min === max) return { min: min - 0.5, max: max + 0.5 };
                return { min, max };
            }

            function getColor(value, min, max) {
                if (value === null || isNaN(value)) return Cesium.Color.GRAY.withAlpha(0.4);
                const t = Math.max(0, Math.min(1, (value - min) / (max - min)));
                const r = 247 - 200 * t;
                const g = 252 - 170 * t;
                const b = 245 - 200 * t;
                return new Cesium.Color(r / 255, (77 + 130 * t) / 255, (122 - 100 * t) / 255, 0.75);
            }

            function refresh() {
                const range = computeRange(currentYear, currentMonth);
                document.getElementById('minVal').textContent = range.min.toFixed(2);
                document.getElementById('maxVal').textContent = range.max.toFixed(2);
                entities.forEach(e => {
                    const name = e.properties?.NAME?.getValue();
                    if (!name) return;
                    const v = getCountyValue(name, currentYear, currentMonth);
                    e.polygon.material = new Cesium.ColorMaterialProperty(getColor(v, range.min, range.max));
                    e.description = `<b>${name}</b><br>碳汇: ${v !== null ? v.toFixed(2) : '无数据'}`;
                });
            }

            refresh();
            yearSelect.addEventListener('change', () => { currentYear = yearSelect.value; refresh(); });
            monthSelect.addEventListener('change', () => { currentMonth = monthSelect.value; refresh(); });

            document.getElementById('zoomIn').onclick = () => viewer.camera.zoomIn(100000);
            document.getElementById('zoomOut').onclick = () => viewer.camera.zoomOut(100000);
            document.getElementById('resetView').onclick = () => {
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(108.2, 33.8, 250000),
                    orientation: { heading: 0, pitch: -1.22173, roll: 0 }
                });
            };

            // 碳汇浮动弹窗
            const popup = document.getElementById('carbonPopup');
            const popupTitle = document.getElementById('popupTitle');
            const popupValue = document.getElementById('popupValue');
            const popupClose = document.getElementById('popupClose');

            function showPopup(x, y, name, value) {
                popupTitle.textContent = name;
                popupValue.textContent = value !== null ? value.toFixed(2) : '无数据';
                popupValue.style.color = value !== null ? (value >= 0 ? '#27ae60' : '#e74c3c') : '#999';
                // 定位弹窗，避免超出屏幕
                const pw = 220, ph = 120;
                let left = x + 16;
                let top = y - 20;
                if (left + pw > window.innerWidth) left = x - pw - 16;
                if (top + ph > window.innerHeight) top = window.innerHeight - ph - 20;
                if (top < 60) top = 60;
                popup.style.left = left + 'px';
                popup.style.top = top + 'px';
                popup.classList.add('visible');
            }

            function hidePopup() {
                popup.classList.remove('visible');
            }

            popupClose.addEventListener('click', (e) => { e.stopPropagation(); hidePopup(); });

            new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas).setInputAction(click => {
                const picked = viewer.scene.pick(click.position);
                if (Cesium.defined(picked) && picked.id?.properties) {
                    const name = picked.id.properties.NAME?.getValue();
                    const v = getCountyValue(name, currentYear, currentMonth);
                    showPopup(click.position.x, click.position.y, name, v);
                } else {
                    hidePopup();
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

            // 移动相机时自动隐藏弹窗
            viewer.camera.changed.addEventListener(hidePopup);
        })();
    </script>
</body>
</html>
