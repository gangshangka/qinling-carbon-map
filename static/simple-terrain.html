
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>秦岭地形轮廓图</title>
    <!-- 主ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- ECharts GL 3D库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <!-- 备用ECharts CDN (unpkg) -->
    <script>
        // 检查ECharts是否加载成功，如果失败则尝试备用CDN
        window.addEventListener('load', function() {
            if (typeof echarts === 'undefined') {
                console.warn('主ECharts CDN加载失败，尝试备用CDN...');
                var backupScript = document.createElement('script');
                backupScript.src = 'https://unpkg.com/echarts@5.4.3/dist/echarts.min.js';
                backupScript.onload = function() {
                    console.log('备用ECharts CDN加载成功');
                    if (window.mapInitializer) window.mapInitializer();
                };
                backupScript.onerror = function() {
                    console.error('所有ECharts CDN加载失败，地图无法显示');
                    if (window.mapInitializer) window.mapInitializer();
                };
                document.head.appendChild(backupScript);
            }
        });
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a1931, #1a3c79);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #00dbde;
        }
        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }
        .map-container {
            width: 100%;
            height: 600px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 150px;
            text-align: center;
        }
        .stat-title {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00dbde;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0 15px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .toggle-btn {
            background: linear-gradient(135deg, #00dbde, #fc00ff);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 219, 222, 0.4);
        }
        .view-select {
            padding: 8px 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            min-width: 120px;
        }
        .view-select:focus {
            outline: none;
            border-color: #00dbde;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .map-container { height: 400px; }
            .stat-card { min-width: 120px; }
            .legend { flex-direction: column; align-items: center; gap: 10px; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
            <header>
            <h1>秦岭地形与碳汇柱状图</h1>
            <p class="subtitle">基于秦岭地区县区边界，展示各区域碳汇柱状数据</p>
        </header>

        <div class="controls">
            <button id="toggle3d" class="toggle-btn">
                🔄 切换到3D侧视图
            </button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="opacity: 0.8;">视角:</span>
                <select id="viewAngle" class="view-select">
                    <option value="top">俯视图</option>
                    <option value="side">侧视图</option>
                    <option value="oblique">斜视图</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-title">数据点数量</div>
                <div class="stat-value" id="data-count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">平均碳汇值</div>
                <div class="stat-value" id="mean-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最高碳汇值</div>
                <div class="stat-value" id="max-value">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最低碳汇值</div>
                <div class="stat-value" id="min-value">-</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ff6666;"></div>
                <span>碳源/负值</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ffcc00;"></div>
                <span>低碳汇</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #66ff66;"></div>
                <span>高碳汇</span>
            </div>
        </div>

        <div class="map-container">
            <div id="map">
                <div id="loading" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #00dbde; font-size: 16px;">
                    <div style="margin-bottom: 20px;">正在加载秦岭地形与碳汇数据...</div>
                    <div style="width: 50px; height: 50px; border: 5px solid rgba(0, 219, 222, 0.3); border-top: 5px solid #00dbde; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <div id="loading-details" style="margin-top: 20px; font-size: 14px; opacity: 0.8;"></div>
                </div>
                <div id="error" style="display: none; padding: 40px; text-align: center; color: #ff6666;">
                    <h3 style="margin-bottom: 15px;">地图加载失败</h3>
                    <p id="error-message" style="margin-bottom: 20px;"></p>
                    <button id="retry-btn" style="background: #00dbde; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">重试加载</button>
                </div>
            </div>
        </div>

        <div class="info">
            <p>蓝色区域：秦岭县区边界 | 彩色柱状条：碳汇值（红→碳源/负值，黄→低碳汇，绿→高碳汇）</p>
        </div>
    </div>

    <script>
        // 全局变量
        let currentChart = null;
        let is3DMode = false;
        let carbonData3D = []; // 存储3D数据
        let currentViewAngle = 'top';
        
        // 颜色辅助函数
        function lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (
                0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        function darkenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) - amt;
            const G = (num >> 8 & 0x00FF) - amt;
            const B = (num & 0x0000FF) - amt;
            return '#' + (
                0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        // 显示加载状态
        function showLoading(message = '正在加载秦岭地形与碳汇数据...') {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const detailsEl = document.getElementById('loading-details');
            
            if (loadingEl) loadingEl.style.display = 'flex';
            if (errorEl) errorEl.style.display = 'none';
            if (detailsEl) detailsEl.textContent = message;
        }
        
        // 隐藏加载状态
        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.style.display = 'none';
        }
        
        // 显示错误
        function showError(message) {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const errorMsgEl = document.getElementById('error-message');
            
            if (loadingEl) loadingEl.style.display = 'none';
            if (errorEl) errorEl.style.display = 'block';
            
            // 检查是否为Tracking Prevention错误
            let displayMessage = message;
            if (message.includes('Tracking Prevention') || message.includes('storage') || message.includes('access')) {
                displayMessage = message + '<br><br><strong>解决方案:</strong><br>' +
                    '1. 请尝试使用其他浏览器（如Chrome、Firefox）<br>' +
                    '2. 或在当前浏览器的隐私设置中允许本网站<br>' +
                    '3. 或点击地址栏的"盾牌"图标，临时禁用跟踪保护';
            }
            
            if (errorMsgEl) errorMsgEl.innerHTML = displayMessage;
            
            console.error('地图加载错误:', message);
        }
        
        // 重试按钮事件
        function setupRetryButton() {
            const retryBtn = document.getElementById('retry-btn');
            if (retryBtn) {
                retryBtn.onclick = function() {
                    console.log('用户点击重试按钮');
                    showLoading('正在重新加载数据...');
                    setTimeout(() => {
                        initMap();
                    }, 500);
                };
            }
        }
        
        // 切换3D模式
        function toggle3DMode() {
            is3DMode = !is3DMode;
            const toggleBtn = document.getElementById('toggle3d');
            const viewSelect = document.getElementById('viewAngle');
            
            if (toggleBtn) {
                toggleBtn.textContent = is3DMode ? '🔄 切换回2D地图' : '🔄 切换到3D侧视图';
            }
            
            if (viewSelect) {
                viewSelect.disabled = !is3DMode;
            }
            
            console.log(`切换到${is3DMode ? '3D' : '2D'}模式`);
            
            // 重新初始化地图
            showLoading(`正在切换到${is3DMode ? '3D' : '2D'}模式...`);
            setTimeout(() => {
                initMap();
            }, 300);
        }
        
        // 更新3D视角
        function update3DViewAngle() {
            const viewSelect = document.getElementById('viewAngle');
            if (!viewSelect || !currentChart || !is3DMode) return;
            
            currentViewAngle = viewSelect.value;
            console.log(`更新3D视角: ${currentViewAngle}`);
            
            const viewControl = {
                top: { alpha: 0, beta: 90, distance: 300 },
                side: { alpha: 40, beta: 20, distance: 300 },
                oblique: { alpha: 30, beta: 45, distance: 350 }
            };
            
            const view = viewControl[currentViewAngle] || viewControl.side;
            
            currentChart.setOption({
                grid3D: {
                    viewControl: view
                }
            });
        }
        
        // 绑定3D控件事件
        function setup3DControls() {
            const toggleBtn = document.getElementById('toggle3d');
            const viewSelect = document.getElementById('viewAngle');
            
            if (toggleBtn) {
                toggleBtn.addEventListener('click', toggle3DMode);
            }
            
            if (viewSelect) {
                viewSelect.addEventListener('change', update3DViewAngle);
                viewSelect.disabled = true; // 初始禁用，直到切换到3D模式
            }
        }
        
        // 初始化图表
        function initMap() {
            console.log('initMap函数开始执行');
            console.log(`当前模式: ${is3DMode ? '3D' : '2D'}`);
            showLoading(`正在初始化${is3DMode ? '3D' : '2D'}地图...`);
            
            // 如果已有图表实例，先销毁
            if (currentChart) {
                currentChart.dispose();
                currentChart = null;
            }
            
            // 检查ECharts是否已加载
            if (typeof echarts === 'undefined') {
                const errorMsg = 'ECharts库未加载！请检查网络连接或CDN链接';
                console.error(errorMsg);
                showError(errorMsg);
                return;
            }
            
            const chartDom = document.getElementById('map');
            if (!chartDom) {
                const errorMsg = '找不到地图容器元素 #map';
                console.error(errorMsg);
                showError(errorMsg);
                return;
            }
            
            let myChart;
            try {
                myChart = echarts.init(chartDom);
                currentChart = myChart;
            } catch (error) {
                const errorMsg = `ECharts初始化失败: ${error.message}`;
                console.error(errorMsg);
                showError(errorMsg);
                return;
            }

            // 根据模式选择不同的初始化
            if (is3DMode) {
                init3DMap(myChart);
            } else {
                init2DMap(myChart);
            }
            
            // 窗口大小变化时重绘
            window.addEventListener('resize', function() {
                myChart.resize();
            });
        }
        
        // 初始化2D地图
        function init2DMap(chart) {
            console.log('初始化2D地图...');
            
            // 基础配置 - 初始不设置geo，等待地图加载
            const option = {
                backgroundColor: 'transparent',
                title: {
                    show: false
                },
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.seriesType === 'scatter') {
                            // 柱状图数据提示
                            return `<strong>${params.data.name}</strong><br/>
                                    碳汇值: <b>${params.data.value[2].toFixed(2)}</b> 单位<br/>
                                    坐标: ${params.data.value[0].toFixed(4)}°E, ${params.data.value[1].toFixed(4)}°N`;
                        } else {
                            // 地图区域提示
                            return `<strong>${params.name}</strong><br/>县区边界`;
                        }
                    },
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    textStyle: { color: '#fff' }
                },
                visualMap: {
                    show: false
                }
                // 注意：初始不设置geo，在loadGeoJSON()中设置
            };

            try {
                chart.setOption(option);
                console.log('2D基础图表配置设置成功');
            } catch (setOptionError) {
                console.error('设置2D图表配置失败:', setOptionError);
                // 尝试使用更简单的配置
                try {
                    const simpleOption = {
                        backgroundColor: 'transparent',
                        title: { show: false }
                    };
                    chart.setOption(simpleOption);
                    console.log('2D简化配置设置成功');
                } catch (simpleError) {
                    console.error('2D简化配置也失败:', simpleError);
                    showError(`2D图表初始化失败: ${setOptionError.message}`);
                    return;
                }
            }
            
            // 先加载地形图，再加载数据
            loadGeoJSON(chart);
        }
        
        // 初始化3D地图
        function init3DMap(chart) {
            console.log('初始化3D地图...');
            
            // 检查ECharts GL是否已加载
            if (typeof echarts.registerMap === 'undefined') {
                console.warn('ECharts GL可能未加载，尝试继续...');
            }
            
            // 3D基础配置
            const option = {
                backgroundColor: 'transparent',
                title: {
                    show: false
                },
                tooltip: {
                    formatter: function(params) {
                        if (params.data) {
                            return `<strong>${params.data.name}</strong><br/>
                                    碳汇值: <b>${params.data.value[2].toFixed(2)}</b> 单位<br/>
                                    坐标: ${params.data.value[0].toFixed(4)}°E, ${params.data.value[1].toFixed(4)}°N`;
                        }
                        return '';
                    },
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    textStyle: { color: '#fff' }
                },
                visualMap: {
                    show: true,
                    left: 'right',
                    top: 'bottom',
                    dimension: 2,
                    min: -100,
                    max: 400,
                    calculable: true,
                    inRange: {
                        color: ['#313695', '#4575b4', '#74add1', '#abd9e9', '#e0f3f8', '#ffffbf', '#fee090', '#fdae61', '#f46d43', '#d73027', '#a50026']
                    },
                    textStyle: {
                        color: '#fff'
                    }
                },
                xAxis3D: {
                    type: 'value',
                    name: '经度',
                    nameTextStyle: { color: '#fff' },
                    axisLine: { lineStyle: { color: '#fff' } },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                yAxis3D: {
                    type: 'value',
                    name: '纬度',
                    nameTextStyle: { color: '#fff' },
                    axisLine: { lineStyle: { color: '#fff' } },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                zAxis3D: {
                    type: 'value',
                    name: '碳汇值',
                    nameTextStyle: { color: '#fff' },
                    axisLine: { lineStyle: { color: '#fff' } },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                grid3D: {
                    boxWidth: 200,
                    boxDepth: 200,
                    environment: 'auto',
                    light: {
                        main: {
                            intensity: 1.5,
                            shadow: true
                        },
                        ambient: {
                            intensity: 0.5
                        }
                    },
                    viewControl: {
                        alpha: 40,
                        beta: 20,
                        distance: 300,
                        minDistance: 100,
                        maxDistance: 800,
                        rotateSensitivity: 1,
                        zoomSensitivity: 1,
                        panSensitivity: 1
                    },
                    postEffect: {
                        enable: true,
                        bloom: {
                            enable: true,
                            bloomIntensity: 0.1
                        },
                        SSAO: {
                            enable: true,
                            radius: 2
                        }
                    }
                },
                series: []
            };
            
            // 根据当前视角更新viewControl
            const viewControl = {
                top: { alpha: 0, beta: 90, distance: 300 },
                side: { alpha: 40, beta: 20, distance: 300 },
                oblique: { alpha: 30, beta: 45, distance: 350 }
            };
            
            if (viewControl[currentViewAngle]) {
                option.grid3D.viewControl = viewControl[currentViewAngle];
            }
            
            try {
                chart.setOption(option);
                console.log('3D基础图表配置设置成功');
            } catch (setOptionError) {
                console.error('设置3D图表配置失败:', setOptionError);
                showError(`3D图表初始化失败: ${setOptionError.message}`);
                return;
            }
            
            // 直接加载碳汇数据（3D模式下不需要地理边界）
            loadCarbonData3D(chart);
        }

        // 更新统计卡片
        function updateStats(stats) {
            document.getElementById('data-count').textContent = stats.countyCount;
            document.getElementById('mean-value').textContent = stats.meanValue.toFixed(2);
            document.getElementById('max-value').textContent = stats.maxValue.toFixed(2);
            document.getElementById('min-value').textContent = stats.minValue.toFixed(2);
        }

        // 加载秦岭地理边界数据（先确保地形图显示）
        async function loadGeoJSON(chart) {
            console.log('开始加载GeoJSON数据...');
            showLoading('正在加载秦岭地形数据...');
            
            // 如果在file://协议下（本地文件），直接使用备用地图，避免CORS限制
            if (window.location.protocol === 'file:') {
                console.log('检测到file://协议，跳过网络请求直接使用备用地图');
                createFallbackMap(chart);
                return;
            }
            
            try {
                // 在小程序web-view环境中，使用正确的相对路径
                const url = '../data/shapefile/qinling.geojson';
                console.log('请求URL:', url);
                const response = await fetch(url);
                console.log('HTTP响应状态:', response.status, response.statusText);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const geoJSON = await response.json();
                console.log('GeoJSON数据加载成功，特征数量:', geoJSON.features ? geoJSON.features.length : 0);
                
                // 删除CRS属性（ECharts可能不支持）
                if (geoJSON.crs) {
                    delete geoJSON.crs;
                    console.log('已删除CRS属性');
                }
                
                // 确保有features
                if (!geoJSON.features || geoJSON.features.length === 0) {
                    throw new Error('GeoJSON数据中没有特征（features）');
                }
                
                // 注册地图（添加详细错误捕获）
                console.log('开始注册地图到ECharts...');
                try {
                    echarts.registerMap('qinling', geoJSON);
                    console.log('地图注册成功！');
                    
                    // 检查地图是否成功注册
                    try {
                        const registeredMaps = echarts.getMap('qinling');
                        console.log('地图注册验证成功:', registeredMaps ? '地图数据已注册' : '地图数据为空');
                    } catch (checkError) {
                        console.warn('地图注册验证失败，但继续:', checkError.message);
                    }
                    
                } catch (registerError) {
                    console.error('ECharts地图注册失败:', registerError);
                    console.error('错误详情:', registerError.message, registerError.stack);
                    
                    // 尝试简化GeoJSON数据
                    console.log('尝试简化GeoJSON数据...');
                    try {
                        // 创建一个简化版本的GeoJSON
                        const simplifiedGeoJSON = {
                            type: "FeatureCollection",
                            features: geoJSON.features.map(feature => {
                                // 只保留必要的属性
                                return {
                                    type: "Feature",
                                    geometry: feature.geometry,
                                    properties: { name: feature.properties ? feature.properties.name || feature.properties.NAME || '未知区域' : '未知区域' }
                                };
                            })
                        };
                        
                        console.log('使用简化GeoJSON重新注册...');
                        echarts.registerMap('qinling', simplifiedGeoJSON);
                        console.log('简化地图注册成功！');
                    } catch (simplifyError) {
                        console.error('简化地图注册也失败:', simplifyError);
                        throw new Error(`地图注册失败: ${registerError.message}`);
                    }
                }
                
                // 更新图表显示地图
                console.log('更新图表显示地图...');
                try {
                    chart.setOption({
                        geo: {
                            map: 'qinling',
                            center: [108.5, 34.2], // 秦岭中心点，纬度调高使地图上移
                            zoom: 1.3, // 稍微放大
                            top: '10%', // 使地图在容器中更靠上
                            itemStyle: {
                                areaColor: '#e8f4ff', // 简约的浅蓝色背景
                                borderColor: '#b3d9ff',
                                borderWidth: 0.5,
                                shadowColor: 'rgba(100, 150, 255, 0.3)', // 柔和的蓝色阴影
                                shadowBlur: 5,
                                shadowOffsetX: 2,
                                shadowOffsetY: 2
                            },
                            emphasis: {
                                itemStyle: {
                                    areaColor: '#3a9ef9'
                                }
                            },
                            roam: true, // 允许缩放和平移
                            label: {
                                show: false // 简约设计，隐藏地图标签
                            }
                        }
                    });
                    console.log('地图更新成功！');
                } catch (mapUpdateError) {
                    console.error('更新地图显示失败:', mapUpdateError);
                    console.error('错误详情:', mapUpdateError.message);
                    
                    // 尝试更简单的更新，只设置地图名称
                    try {
                        chart.setOption({
                            geo: { map: 'qinling' }
                        });
                        console.log('简化地图更新成功');
                    } catch (simpleUpdateError) {
                        console.error('简化地图更新也失败:', simpleUpdateError);
                        // 继续加载碳汇数据，地图可能仍然显示
                    }
                }
                
                console.log('地形图加载成功，开始加载碳汇数据...');
                showLoading('地形图加载成功，正在加载碳汇数据...');
                
                // 地形图加载成功后，再加载碳汇数据
                await loadCarbonData(chart);
                
                // 全部加载完成
                console.log('所有数据加载完成！');
                hideLoading();
                
            } catch (error) {
                console.error('加载GeoJSON数据失败:', error);
                showError(`加载地形数据失败: ${error.message}`);
                // 使用简单备用数据
                try {
                    createFallbackMap(chart);
                    hideLoading(); // 备用地图加载成功
                } catch (fallbackError) {
                    console.error('备用地图也加载失败:', fallbackError);
                    showError(`加载失败: ${error.message}。备用地图也无法加载。`);
                }
            }
        }

        // 加载碳汇数据并添加散点
        async function loadCarbonData(chart) {
            try {
                console.log('开始加载碳汇数据...');
                
                // 如果在file://协议下（本地文件），使用模拟数据，避免CORS限制
                if (window.location.protocol === 'file:') {
                    console.log('检测到file://协议，使用模拟碳汇数据');
                    // 创建模拟数据
                    const mockData = [
                        { name: "模拟点1", value: [108.0, 33.5, 150], carbon: 150 },
                        { name: "模拟点2", value: [109.0, 33.0, 200], carbon: 200 },
                        { name: "模拟点3", value: [107.5, 34.0, 50], carbon: 50 },
                        { name: "模拟点4", value: [110.0, 34.5, 300], carbon: 300 }
                    ];
                    carbonData3D = mockData;
                    const stats = {
                        countyCount: 4,
                        meanValue: 175,
                        maxValue: 300,
                        minValue: 50
                    };
                    updateStats(stats);
                    
                    // 添加柱形图系列到现有图表
                    chart.setOption({
                        series: [
                            {
                                type: 'scatter',
                                coordinateSystem: 'geo',
                                data: mockData.map(item => ({
                                    name: item.name,
                                    value: item.value,
                                    symbolSize: 15,
                                    itemStyle: { color: get2DColor(item.carbon) }
                                })),
                                symbol: 'circle'
                            }
                        ]
                    });
                    return;
                }
                
                // 在小程序web-view环境中，使用正确的相对路径
                const dataUrl = '../data/map3d_sampled.json';
                console.log('请求碳汇数据URL:', dataUrl);
                const dataResponse = await fetch(dataUrl);
                console.log('碳汇数据HTTP响应状态:', dataResponse.status, dataResponse.statusText);
                if (!dataResponse.ok) {
                    throw new Error(`碳汇数据加载失败: ${dataResponse.status}`);
                }
                const data = await dataResponse.json();
                console.log('碳汇数据加载成功，数据类型:', typeof data, '特征数量:', data.features ? data.features.length : 0);
                
                // 提取数据
                const carbonData = data.features || [];
                // 保存到全局变量供3D模式使用
                carbonData3D = carbonData.map(item => ({
                    name: item.name,
                    value: [item.center[0], item.center[1], item.carbon || 0],
                    carbon: item.carbon || 0
                }));
                const stats = {
                    countyCount: data.total_stats?.valid_samples || 0,
                    meanValue: data.total_stats?.mean_value || 0,
                    maxValue: data.total_stats?.max_value || 0,
                    minValue: data.total_stats?.min_value || 0
                };
                
                // 更新统计卡片
                updateStats(stats);
                
                // 准备柱形图数据（使用碳汇值作为高度）
                const barData = carbonData.map(item => {
                    const carbonValue = item.carbon || 0;
                    // 使用经度、纬度、碳汇值（第三个值用于柱状条高度）
                    const coords = [item.center[0], item.center[1], carbonValue];
                    
                    return {
                        name: item.name,
                        value: coords
                    };
                });
                
                console.log(`准备显示 ${barData.length} 个数据点`);
                
                // 添加柱形图系列到现有图表
                chart.setOption({
                    series: [
                        {
                            type: 'scatter',
                            coordinateSystem: 'geo',
                            data: barData,
                            symbol: 'path://M0,0 L1,0 L1,1 L0,1 Z', // 矩形符号
                            symbolSize: function(val) {
                                const carbonValue = Math.abs(val[2]);
                                // 宽度固定为8，高度基于碳汇值缩放（最小5，最大40）
                                const height = Math.max(5, Math.min(40, carbonValue / 10));
                                return [8, height];
                            },
                            symbolOffset: function(val) {
                                // 将柱状条底部对齐到坐标点
                                const carbonValue = Math.abs(val[2]);
                                const height = Math.max(5, Math.min(40, carbonValue / 10));
                                return [0, -height / 2]; // 因为符号锚点在中心，需要上移一半高度使底部对齐
                            },
                            itemStyle: {
                                color: function(params) {
                                    const val = params.data.value[2];
                                    let baseColor;
                                    if (val <= 0) baseColor = '#ff6666';
                                    else if (val < 100) baseColor = '#ffcc00';
                                    else if (val < 250) baseColor = '#66ff66';
                                    else baseColor = '#00cc66';
                                    
                                    // 创建立体渐变效果：上亮下暗
                                    return {
                                        type: 'linear',
                                        x: 0,
                                        y: 0,
                                        x2: 0,
                                        y2: 1,
                                        colorStops: [
                                            {offset: 0, color: lightenColor(baseColor, 30)}, // 顶部较亮
                                            {offset: 0.7, color: baseColor}, // 中部原色
                                            {offset: 1, color: darkenColor(baseColor, 30)}  // 底部较暗
                                        ]
                                    };
                                },
                                opacity: 0.95,
                                borderColor: '#ffffff',
                                borderWidth: 0.5,
                                shadowBlur: 6,
                                shadowColor: 'rgba(0, 0, 0, 0.4)',
                                shadowOffsetX: 1,
                                shadowOffsetY: 2
                            },
                            emphasis: {
                                itemStyle: {
                                    borderColor: '#fff',
                                    borderWidth: 2,
                                    shadowBlur: 10,
                                    shadowColor: 'rgba(0, 255, 255, 0.8)'
                                }
                            },
                            zlevel: 2,
                            label: {
                                show: false // 简约设计，隐藏标签
                            }
                        }
                    ]
                });
                
                console.log('碳汇数据添加完成');
                
            } catch (error) {
                console.error('加载碳汇数据失败:', error);
                // 碳汇数据加载失败不影响地形图显示
                // 只更新统计卡片为0值
                updateStats({
                    countyCount: 0,
                    meanValue: 0,
                    maxValue: 0,
                    minValue: 0
                });
            }
        }

        // 加载碳汇数据并显示3D图表
        async function loadCarbonData3D(chart) {
            try {
                console.log('开始加载3D碳汇数据...');
                
                // 如果已有数据，直接使用
                if (carbonData3D.length > 0) {
                    console.log(`使用缓存的3D数据，共 ${carbonData3D.length} 个点`);
                    display3DData(chart, carbonData3D);
                    return;
                }
                
                // 如果在file://协议下（本地文件），使用备用3D数据，避免CORS限制
                if (window.location.protocol === 'file:') {
                    console.log('检测到file://协议，使用备用3D数据');
                    createFallback3DMap(chart);
                    return;
                }
                
                // 否则从文件加载
                // 在小程序web-view环境中，使用正确的相对路径
                const dataUrl = '../data/map3d_sampled.json';
                console.log('请求3D碳汇数据URL:', dataUrl);
                const dataResponse = await fetch(dataUrl);
                console.log('3D碳汇数据HTTP响应状态:', dataResponse.status, dataResponse.statusText);
                if (!dataResponse.ok) {
                    throw new Error(`3D碳汇数据加载失败: ${dataResponse.status}`);
                }
                const data = await dataResponse.json();
                console.log('3D碳汇数据加载成功，特征数量:', data.features ? data.features.length : 0);
                
                // 提取数据
                const carbonData = data.features || [];
                carbonData3D = carbonData.map(item => ({
                    name: item.name,
                    value: [item.center[0], item.center[1], item.carbon || 0],
                    carbon: item.carbon || 0
                }));
                
                display3DData(chart, carbonData3D);
                
            } catch (error) {
                console.error('加载3D碳汇数据失败:', error);
                // 尝试显示备用3D数据
                createFallback3DMap(chart);
            }
        }
        
        // 显示3D数据
        function display3DData(chart, data) {
            console.log(`显示3D数据，共 ${data.length} 个点`);
            
            // 更新统计卡片
            const stats = {
                countyCount: data.length,
                meanValue: data.reduce((sum, d) => sum + d.carbon, 0) / data.length || 0,
                maxValue: Math.max(...data.map(d => d.carbon)),
                minValue: Math.min(...data.map(d => d.carbon))
            };
            updateStats(stats);
            
            // 准备3D柱状图数据
            const bar3DData = data.map(item => ({
                name: item.name,
                value: item.value,
                itemStyle: {
                    color: get3DColor(item.carbon)
                }
            }));
            
            // 添加3D柱状图系列
            chart.setOption({
                series: [
                    {
                        type: 'bar3D',
                        data: bar3DData,
                        barSize: 1.5, // 柱状条尺寸
                        bevelSize: 0.3, // 斜面尺寸，增加立体感
                        bevelSmoothness: 2, // 斜面平滑度
                        shading: 'lambert', // 着色方式，增加立体感
                        label: {
                            show: false
                        },
                        emphasis: {
                            label: {
                                show: true,
                                formatter: function(params) {
                                    return `${params.data.name}\n${params.data.value[2].toFixed(1)}`;
                                },
                                position: 'top',
                                textStyle: {
                                    color: '#fff',
                                    fontSize: 12,
                                    backgroundColor: 'rgba(0,0,0,0.7)',
                                    padding: [4, 6],
                                    borderRadius: 4
                                }
                            },
                            itemStyle: {
                                color: function(params) {
                                    return get3DColor(bar3DData[params.dataIndex].carbon, true);
                                }
                            }
                        },
                        itemStyle: {
                            opacity: 0.9,
                            borderWidth: 0.5,
                            borderColor: 'rgba(255,255,255,0.3)'
                        }
                    }
                ]
            });
            
            console.log('3D柱状图添加完成');
            hideLoading();
        }
        
        // 获取3D颜色
        function get3DColor(value, emphasis = false) {
            let baseColor;
            if (value <= 0) baseColor = '#ff6666';
            else if (value < 100) baseColor = '#ffcc00';
            else if (value < 250) baseColor = '#66ff66';
            else baseColor = '#00cc66';
            
            if (emphasis) {
                return lightenColor(baseColor, 30);
            }
            
            // 创建立体渐变
            return {
                type: 'linear',
                x: 0,
                y: 0,
                x2: 0,
                y2: 1,
                colorStops: [
                    {offset: 0, color: lightenColor(baseColor, 20)},
                    {offset: 0.5, color: baseColor},
                    {offset: 1, color: darkenColor(baseColor, 20)}
                ]
            };
        }

        // 获取2D颜色（用于散点图）
        function get2DColor(value) {
            if (value <= 0) return '#ff6666';
            else if (value < 100) return '#ffcc00';
            else if (value < 250) return '#66ff66';
            else return '#00cc66';
        }

        // 备用3D地图数据
        function createFallback3DMap(chart) {
            console.log('使用备用3D地图数据');
            
            // 创建模拟3D数据
            const mockData = [];
            const baseLon = 108.0, baseLat = 33.5;
            
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 5; j++) {
                    const carbonValue = Math.round(50 + Math.random() * 300);
                    mockData.push({
                        name: `模拟点${i * 5 + j + 1}`,
                        value: [baseLon + i * 0.5, baseLat + j * 0.3, carbonValue],
                        carbon: carbonValue
                    });
                }
            }
            
            carbonData3D = mockData;
            display3DData(chart, mockData);
        }

        // 备用地图数据（当加载失败时使用）
        function createFallbackMap(chart) {
            console.log('使用备用地图数据');
            
            // 创建一个简单的矩形区域作为备用
            const simpleGeoJSON = {
                type: "FeatureCollection",
                features: [
                    {
                        type: "Feature",
                        properties: { name: "秦岭区域" },
                        geometry: {
                            type: "Polygon",
                            coordinates: [[
                                [105, 32], [111, 32], [111, 35], [105, 35], [105, 32]
                            ]]
                        }
                    }
                ]
            };
            
            echarts.registerMap('qinling', simpleGeoJSON);
            
            // 创建一些模拟数据点
            const mockData = [
                { name: "模拟点1", value: [108.0, 33.5, 150], color: '#66ff66' },
                { name: "模拟点2", value: [109.0, 33.0, 200], color: '#66ff66' },
                { name: "模拟点3", value: [107.5, 34.0, 50], color: '#ffcc00' },
                { name: "模拟点4", value: [110.0, 34.5, 300], color: '#00cc66' }
            ];
            
            chart.setOption({
                geo: {
                    map: 'qinling',
                    center: [108, 33.5],
                    zoom: 1,
                    itemStyle: {
                        areaColor: 'rgba(50, 150, 200, 0.3)',
                        borderColor: 'rgba(255, 255, 255, 0.6)',
                        borderWidth: 1
                    }
                },
                series: [
                    {
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: mockData.map(item => ({
                            name: item.name,
                            value: item.value,
                            symbolSize: 15,
                            itemStyle: { color: item.color }
                        })),
                        symbol: 'circle'
                    }
                ]
            });
            
            // 更新统计卡片为模拟值
            document.getElementById('data-count').textContent = '4';
            document.getElementById('mean-value').textContent = '175.00';
            document.getElementById('max-value').textContent = '300.00';
            document.getElementById('min-value').textContent = '50.00';
            
            // 设置carbonData3D以供3D模式使用
            carbonData3D = mockData.map(item => ({
                name: item.name,
                value: item.value,
                carbon: item.value[2] // 从value数组中提取碳汇值
            }));
        }

        // 地图初始化函数
        window.mapInitializer = function() {
            console.log('===== 地图初始化开始 =====');
            console.log('ECharts库状态:', typeof echarts);
            
            if (typeof echarts === 'undefined') {
                console.error('ECharts库未加载！地图无法显示');
                showError('ECharts库加载失败，请检查网络连接或刷新页面');
                return;
            }
            
            // 设置重试按钮
            setupRetryButton();
            
            // 设置3D控件
            setup3DControls();
            
            // 添加全局错误处理
            window.addEventListener('error', function(event) {
                console.error('全局JavaScript错误:', event.error);
                console.error('错误发生在:', event.filename, '第', event.lineno, '行');
            });
            
            initMap();
            
            // 添加加载完成提示和状态检查
            setTimeout(() => {
                console.log('秦岭地形与碳汇数据图初始化完成！');
                console.log('请按F12打开开发者工具查看详细日志和错误信息');
                console.log('如果地图未显示，请检查:');
                console.log('1. 控制台是否有红色错误');
                console.log('2. 数据文件URL是否能访问:');
                console.log('   - http://localhost:9700/data/shapefile/qinling.geojson');
                console.log('   - http://localhost:9700/data/map3d_sampled.json');
                
                // 检查地图显示状态
                console.log('===== 地图状态检查 =====');
                const mapContainer = document.getElementById('map');
                if (mapContainer) {
                    console.log('地图容器信息:');
                    console.log('  大小:', mapContainer.offsetWidth, 'x', mapContainer.offsetHeight, 'px');
                    console.log('  可见性:', window.getComputedStyle(mapContainer).visibility);
                    console.log('  显示:', window.getComputedStyle(mapContainer).display);
                    console.log('  透明度:', window.getComputedStyle(mapContainer).opacity);
                    
                    // 检查ECharts实例
                    if (currentChart) {
                        console.log('ECharts实例状态: 已创建');
                        try {
                            const option = currentChart.getOption();
                            console.log('当前配置中的地图:', option.geo ? (option.geo[0] ? option.geo[0].map : '无') : '无geo配置');
                            console.log('系列数量:', option.series ? option.series.length : 0);
                        } catch (e) {
                            console.log('无法获取ECharts配置:', e.message);
                        }
                    } else {
                        console.log('ECharts实例状态: 未创建或已销毁');
                    }
                } else {
                    console.error('错误: 找不到地图容器 #map');
                }
                
                // 检查统计卡片是否更新
                const dataCount = document.getElementById('data-count').textContent;
                console.log('统计卡片数据点数量:', dataCount);
                
                if (dataCount !== '-' && dataCount !== '0') {
                    console.log('✅ 数据已加载，统计卡片已更新');
                } else {
                    console.log('⚠️  统计卡片可能未正确更新');
                }
                
                console.log('===== 状态检查结束 =====');
            }, 1000);
        };
        
        // 页面加载完成后初始化
        window.onload = function() {
            console.log('===== 页面加载完成 =====');
            console.log('开始初始化地图...');
            
            // 检查ECharts是否已加载，如果已加载则立即初始化
            if (typeof echarts !== 'undefined') {
                console.log('ECharts已加载，开始初始化...');
                window.mapInitializer();
            } else {
                console.warn('ECharts尚未加载，等待备用CDN或5秒后重试...');
                // 如果5秒后ECharts仍未加载，尝试初始化
                setTimeout(function() {
                    if (typeof echarts !== 'undefined') {
                        console.log('ECharts在5秒后加载完成，开始初始化...');
                        window.mapInitializer();
                    } else {
                        console.error('ECharts加载超时，尝试初始化备用方案...');
                        window.mapInitializer();
                    }
                }, 5000);
            }
        };
    </script>
</body>
