<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .status {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .success {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>✅ WebView加载成功！</h1>
    <p>这是秦岭地形图与月度碳汇3D柱状图的测试页面。<br>如果能看到此页面，说明web-view功能正常。</p>
    
    <div class="status">
        <p>当前时间: <span id="time"></span></p>
        <p>页面状态: <span class="success">✓ 正常运行</span></p>
    </div>
    
    <script>
        // 显示当前时间
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = 
                now.toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
        }
        
        updateTime();
        setInterval(updateTime, 1000);
        
        // 向小程序发送消息（如果在小程序环境中）
        if (typeof wx !== 'undefined' && wx.miniProgram) {
            wx.miniProgram.postMessage({ 
                data: { 
                    type: 'webview_loaded',
                    time: new Date().toISOString()
                }
            });
        }
    </script>
</body>
</html>
