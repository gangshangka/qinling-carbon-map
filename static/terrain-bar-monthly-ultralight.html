<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秦岭地形图与月度碳汇3D柱状图</title>
    <!-- 使用可靠的国内CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a1931;
            color: #fff;
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 10px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #00dbde;
        }
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            justify-content: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        label {
            font-size: 0.9rem;
        }
        select, button {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            min-width: 80px;
        }
        button {
            background: linear-gradient(135deg, #00dbde, #1a73e8);
            border: none;
            cursor: pointer;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
            justify-content: center;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 100px;
            text-align: center;
        }
        .stat-title {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 3px;
        }
        .stat-value {
            font-size: 1rem;
            font-weight: bold;
            color: #00dbde;
        }
        .map-container {
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 219, 222, 0.3);
            border-top: 4px solid #00dbde;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            margin-top: 10px;
            color: #00dbde;
            font-size: 0.9rem;
        }
        .error {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 15px;
            text-align: center;
        }
        .error-title {
            color: #ff6666;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .error-msg {
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>秦岭地形图与月度碳汇3D柱状图</h1>
            <div class="subtitle">底图为秦岭地形轮廓，上层为各县区碳汇值柱状图</div>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="year">年份:</label>
                <select id="year">
                    <option value="2022" selected>2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                </select>
            </div>
            <div class="control-group">
                <label for="month">月份:</label>
                <select id="month">
                    <option value="1" selected>1月</option>
                    <option value="2">2月</option>
                    <option value="3">3月</option>
                    <option value="4">4月</option>
                    <option value="5">5月</option>
                    <option value="6">6月</option>
                </select>
            </div>
            <button id="update">更新</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-title">县区数量</div>
                <div class="stat-value" id="count">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">平均碳汇</div>
                <div class="stat-value" id="mean">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最高值</div>
                <div class="stat-value" id="max">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">最低值</div>
                <div class="stat-value" id="min">-</div>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div class="loading-text">正在加载地图...</div>
            </div>
            <div id="error" class="error">
                <div class="error-title">加载失败</div>
                <div class="error-msg" id="errorMsg"></div>
                <button id="retry">重试</button>
            </div>
        </div>
    </div>

    <script>
        // 简化数据 - 完全使用模拟数据避免网络请求
        const mockCountyData = {
            "宁陕县": { lon: 108.44, lat: 33.53 },
            "丹凤县": { lon: 110.43, lat: 33.68 },
            "柞水县": { lon: 109.27, lat: 33.69 },
            "长安区": { lon: 108.93, lat: 34.04 },
            "鄠邑区": { lon: 108.58, lat: 34.00 },
            "蓝田县": { lon: 109.41, lat: 34.10 },
            "周至县": { lon: 108.11, lat: 33.95 }
        };

        // 月度模拟数据
        const mockMonthlyData = {
            "2022": {
                "1": { "宁陕县": 150, "丹凤县": 200, "柞水县": 180, "长安区": 120, "鄠邑区": 110, "蓝田县": 130, "周至县": 140 },
                "2": { "宁陕县": 160, "丹凤县": 210, "柞水县": 190, "长安区": 130, "鄠邑区": 120, "蓝田县": 140, "周至县": 150 },
                "3": { "宁陕县": 170, "丹凤县": 220, "柞水县": 200, "长安区": 140, "鄠邑区": 130, "蓝田县": 150, "周至县": 160 },
                "4": { "宁陕县": 180, "丹凤县": 230, "柞水县": 210, "长安区": 150, "鄠邑区": 140, "蓝田县": 160, "周至县": 170 },
                "5": { "宁陕县": 190, "丹凤县": 240, "柞水县": 220, "长安区": 160, "鄠邑区": 150, "蓝田县": 170, "周至县": 180 },
                "6": { "宁陕县": 200, "丹凤县": 250, "柞水县": 230, "长安区": 170, "鄠邑区": 160, "蓝田县": 180, "周至县": 190 }
            },
            "2021": {
                "1": { "宁陕县": 140, "丹凤县": 190, "柞水县": 170, "长安区": 110, "鄠邑区": 100, "蓝田县": 120, "周至县": 130 },
                "2": { "宁陕县": 150, "丹凤县": 200, "柞水县": 180, "长安区": 120, "鄠邑区": 110, "蓝田县": 130, "周至县": 140 }
            },
            "2020": {
                "1": { "宁陕县": 130, "丹凤县": 180, "柞水县": 160, "长安区": 100, "鄠邑区": 90, "蓝田县": 110, "周至县": 120 },
                "2": { "宁陕县": 140, "丹凤县": 190, "柞水县": 170, "长安区": 110, "鄠邑区": 100, "蓝田县": 120, "周至县": 130 }
            }
        };

        let chart = null;
        let currentYear = '2022';
        let currentMonth = '1';

        // DOM元素
        const yearSelect = document.getElementById('year');
        const monthSelect = document.getElementById('month');
        const updateBtn = document.getElementById('update');
        const retryBtn = document.getElementById('retry');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorMsgEl = document.getElementById('errorMsg');

        // 显示/隐藏加载和错误
        function showLoading(msg) {
            loadingEl.style.display = 'flex';
            errorEl.style.display = 'none';
            if (msg) loadingEl.querySelector('.loading-text').textContent = msg;
        }
        
        function hideLoading() {
            loadingEl.style.display = 'none';
        }
        
        function showError(msg) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'flex';
            errorMsgEl.textContent = msg || '未知错误';
        }

        // 初始化控件
        function initControls() {
            yearSelect.value = currentYear;
            monthSelect.value = currentMonth;
            
            yearSelect.addEventListener('change', function() {
                currentYear = this.value;
            });
            
            monthSelect.addEventListener('change', function() {
                currentMonth = this.value;
            });
            
            updateBtn.addEventListener('click', updateChart);
            retryBtn.addEventListener('click', initApp);
        }

        // 初始化应用
        async function initApp() {
            console.log('初始化应用...');
            showLoading();
            
            try {
                // 检查ECharts是否加载
                if (typeof echarts === 'undefined') {
                    throw new Error('ECharts库加载失败');
                }
                
                // 初始化图表
                const chartDom = document.getElementById('map');
                if (!chartDom) {
                    throw new Error('找不到地图容器');
                }
                
                if (chart) {
                    chart.dispose();
                }
                
                chart = echarts.init(chartDom);
                
                // 创建简化的秦岭区域
                const qinlingGeoJSON = {
                    type: "FeatureCollection",
                    features: [{
                        type: "Feature",
                        properties: { name: "秦岭区域" },
                        geometry: {
                            type: "Polygon",
                            coordinates: [[
                                [105, 32], [111, 32], [111, 35], [105, 35], [105, 32]
                            ]]
                        }
                    }]
                };
                
                // 注册地图
                echarts.registerMap('qinling', qinlingGeoJSON);
                
                // 设置基础地图
                chart.setOption({
                    geo: {
                        map: 'qinling',
                        center: [108.5, 33.5],
                        zoom: 1.2,
                        itemStyle: {
                            areaColor: 'rgba(100, 150, 200, 0.3)',
                            borderColor: 'rgba(200, 200, 255, 0.6)',
                            borderWidth: 0.8
                        },
                        roam: true,
                        label: { show: false }
                    }
                });
                
                // 更新图表
                updateChart();
                
                hideLoading();
                console.log('应用初始化成功');
                
            } catch (error) {
                console.error('初始化失败:', error);
                showError(`初始化失败: ${error.message}`);
            }
        }

        // 更新图表数据
        function updateChart() {
            console.log('更新图表数据...');
            
            if (!chart) {
                console.error('图表未初始化');
                return;
            }
            
            try {
                // 获取当前月份数据
                const yearData = mockMonthlyData[currentYear];
                if (!yearData) {
                    throw new Error(`没有 ${currentYear} 年数据`);
                }
                
                const monthData = yearData[currentMonth];
                if (!monthData) {
                    throw new Error(`没有 ${currentYear} 年 ${currentMonth} 月数据`);
                }
                
                // 准备图表数据
                const chartData = [];
                let total = 0;
                let max = -Infinity;
                let min = Infinity;
                let count = 0;
                
                for (const [county, value] of Object.entries(monthData)) {
                    const coords = mockCountyData[county];
                    if (coords) {
                        chartData.push({
                            name: county,
                            value: [coords.lon, coords.lat, value],
                            carbon: value
                        });
                        
                        total += value;
                        if (value > max) max = value;
                        if (value < min) min = value;
                        count++;
                    }
                }
                
                const mean = count > 0 ? total / count : 0;
                
                // 更新统计
                document.getElementById('count').textContent = count;
                document.getElementById('mean').textContent = mean.toFixed(1);
                document.getElementById('max').textContent = max.toFixed(1);
                document.getElementById('min').textContent = min.toFixed(1);
                
                // 更新图表
                chart.setOption({
                    series: [{
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: chartData,
                        symbol: 'circle',
                        symbolSize: function(val) {
                            const size = Math.max(8, Math.min(25, Math.abs(val[2]) / 10));
                            return size;
                        },
                        itemStyle: {
                            color: function(params) {
                                const val = params.data.value[2];
                                if (val <= 0) return '#ff6666';
                                else if (val < 100) return '#ffcc00';
                                else if (val < 250) return '#66ff66';
                                else return '#00cc66';
                            },
                            opacity: 0.8,
                            borderColor: '#fff',
                            borderWidth: 1
                        },
                        label: {
                            show: true,
                            formatter: '{b}',
                            position: 'top',
                            color: '#fff',
                            fontSize: 10,
                            backgroundColor: 'rgba(0,0,0,0.5)',
                            padding: [2, 4]
                        }
                    }]
                });
                
                console.log('图表更新成功');
                
            } catch (error) {
                console.error('更新图表失败:', error);
                showError(`更新失败: ${error.message}`);
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            console.log('页面加载完成');
            initControls();
            
            // 设置超时检测
            setTimeout(() => {
                if (loadingEl.style.display === 'flex') {
                    console.warn('加载超时，尝试继续初始化');
                    initApp();
                }
            }, 5000);
            
            // 初始化应用
            initApp();
            
            // 窗口大小变化时重绘
            window.addEventListener('resize', function() {
                if (chart) {
                    chart.resize();
                }
            });
        });

        // 备用：如果ECharts加载失败，尝试其他CDN
        if (typeof echarts === 'undefined') {
            console.warn('主CDN加载失败，尝试备用CDN...');
            const backupScript = document.createElement('script');
            backupScript.src = 'https://unpkg.com/echarts@5.4.3/dist/echarts.min.js';
            backupScript.onload = function() {
                console.log('备用CDN加载成功');
                if (window.initApp) initApp();
            };
            backupScript.onerror = function() {
                console.error('所有CDN加载失败');
                // 显示降级内容
                showError('图表库加载失败，显示静态预览');
                showStaticPreview();
            };
            document.head.appendChild(backupScript);
        }
        
        // 显示静态预览（当ECharts完全失败时）
        function showStaticPreview() {
            const chartDom = document.getElementById('map');
            if (!chartDom) return;
            
            chartDom.innerHTML = `
                <div style="padding: 20px; text-align: center; color: white;">
                    <h3 style="color: #00dbde; margin-bottom: 15px;">秦岭地形图与月度碳汇数据</h3>
                    <p style="margin-bottom: 20px;">图表库加载失败，显示数据预览：</p>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px;">
                        <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px;">
                            <div style="font-size: 0.9rem; opacity: 0.8;">宁陕县</div>
                            <div style="font-size: 1.2rem; color: #00dbde;">150.0</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px;">
                            <div style="font-size: 0.9rem; opacity: 0.8;">丹凤县</div>
                            <div style="font-size: 1.2rem; color: #00dbde;">200.0</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px;">
                            <div style="font-size: 0.9rem; opacity: 0.8;">柞水县</div>
                            <div style="font-size: 1.2rem; color: #00dbde;">180.0</div>
                        </div>
                    </div>
                    <p style="font-size: 0.9rem; opacity: 0.7;">2022年1月数据 | 单位: gC/m²</p>
                </div>
            `;
            hideLoading();
        }
    </script>
</body>
</html>
