name: Deploy to GitHub Pages

on:
  push:
    branches: [carbon-map]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Prepare deployment
        run: |
          mkdir -p _site
          # Copy all project files except heavy/unnecessary dirs
          rsync -a --exclude='node_modules' --exclude='.git' --exclude='.vercel' \
            --exclude='deploy-temp' --exclude='temp-ec' --exclude='.cloudbase' \
            --exclude='.rules' --exclude='.github' --exclude='*.tif' \
            --exclude='qinling-3d-map.zip' --exclude='miniprogram_npm' \
            --exclude='et --hard 06965d07' \
            ./ _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
